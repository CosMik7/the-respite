// ----- XP + Victories trackers -----

function XPBar({ c, set, compact = false }) {
  const canEdit = useCanEdit();
  const xp = c.xp || { current: 0, next: 15 };
  const next = xp.next || 15;
  const pct = Math.max(0, Math.min(100, (xp.current / next) * 100));
  const adjust = (delta) => {
    const v = Math.max(0, xp.current + delta);
    set("xp", { ...xp, current: v });
  };
  const setNext = (n) => set("xp", { ...xp, next: Math.max(1, n) });

  return (
    <div className="card" style={{ padding: compact ? "8px 12px" : "10px 14px", background: "var(--bg-0)" }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", marginBottom: 6 }}>
        <span className="eyebrow">Experience</span>
        <div style={{ display: "flex", gap: 6, alignItems: "baseline" }}>
          {!compact && canEdit && (
            <>
              <button className="btn ghost sm" style={{ padding: "1px 7px", borderRadius: 3, fontSize: 11 }} onClick={() => adjust(-1)}>−</button>
              <button className="btn ghost sm" style={{ padding: "1px 7px", borderRadius: 3, fontSize: 11 }} onClick={() => adjust(+1)}>+</button>
            </>
          )}
          <span className="serif" style={{ fontSize: compact ? 14 : 17, fontWeight: 600, color: "var(--ink-0)", fontVariantNumeric: "tabular-nums" }}>
            {xp.current}<span className="dim" style={{ fontSize: compact ? 11 : 13 }}> / {next}</span>
          </span>
        </div>
      </div>
      <div className="bar" style={{ height: compact ? 6 : 8 }}>
        <div className="fill" style={{
          width: `${pct}%`,
          background: "linear-gradient(90deg, oklch(0.55 0.12 45), var(--gold))",
        }}/>
      </div>
      {!compact && (
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginTop: 6 }}>
          <span className="dim mono" style={{ fontSize: 10 }}>
            {Math.max(0, next - xp.current)} XP to level {c.level + 1}
          </span>
          <MaxControl label="Cap" value={next} min={1} onChange={setNext}/>
        </div>
      )}
    </div>
  );
}

function VictoriesTrack({ c, set, compact = false }) {
  const canEdit = useCanEdit();
  const v = c.victories ?? 0;
  const max = 30;
  const milestones = [15, 30];
  const adjust = (delta) => set("victories", Math.max(0, Math.min(max, v + delta)));
  const setTo = (n) => set("victories", n);

  return (
    <div className="card" style={{ padding: compact ? "8px 12px" : "10px 14px", background: "var(--bg-0)" }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", marginBottom: 6 }}>
        <span className="eyebrow">Victories</span>
        <div style={{ display: "flex", gap: 6, alignItems: "baseline" }}>
          {!compact && canEdit && (
            <>
              <button className="btn ghost sm" style={{ padding: "1px 7px", borderRadius: 3, fontSize: 11 }} onClick={() => adjust(-1)}>−</button>
              <button className="btn ghost sm" style={{ padding: "1px 7px", borderRadius: 3, fontSize: 11 }} onClick={() => adjust(+1)}>+</button>
            </>
          )}
          <span className="serif" style={{ fontSize: compact ? 14 : 17, fontWeight: 600, color: "var(--ink-0)", fontVariantNumeric: "tabular-nums" }}>
            {v}<span className="dim" style={{ fontSize: compact ? 11 : 13 }}> / {max}</span>
          </span>
        </div>
      </div>
      <div style={{ display: "grid", gridTemplateColumns: "repeat(15, 1fr)", gap: 3 }}>
        {Array.from({ length: max }).map((_, i) => {
          const filled = i < v;
          const isMilestone = milestones.includes(i + 1);
          return (
            <button
              key={i}
              onClick={canEdit ? () => setTo(i + 1 === v ? i : i + 1) : undefined}
              title={canEdit ? `Set victories to ${i + 1 === v ? i : i + 1}${isMilestone ? " · milestone" : ""}` : undefined}
              style={{
                aspectRatio: "1 / 1",
                border: `1px solid ${filled ? (isMilestone ? "var(--gold)" : "var(--ember-deep)") : (isMilestone ? "var(--gold-soft)" : "var(--line-strong)")}`,
                background: filled ? (isMilestone ? "var(--gold)" : "var(--ember)") : "var(--bg-2)",
                cursor: canEdit ? "pointer" : "default",
                borderRadius: 2,
                padding: 0,
                transform: "rotate(45deg) scale(0.85)",
                boxShadow: filled ? (isMilestone ? "0 0 8px oklch(0.80 0.11 85 / 0.5)" : "0 0 5px var(--ember-glow)") : "none",
                transition: "all 0.12s",
              }}
            />
          );
        })}
      </div>
      {!compact && (
        <div className="dim mono" style={{ fontSize: 10, marginTop: 8, display: "flex", justifyContent: "space-between" }}>
          <span>Converted to XP on a Respite</span>
          <span style={{ color: "var(--gold-soft)" }}>◆ milestone every 15</span>
        </div>
      )}
    </div>
  );
}

function SurgesTile({ c, set }) {
  const canEdit = useCanEdit();
  const s = c.surges ?? 0;
  const adjust = (delta) => set("surges", Math.max(0, s + delta));
  // A surge adds bonus damage equal to your highest characteristic.
  const stats = Object.values(c.characteristics || {});
  const highest = stats.length ? Math.max(...stats) : 0;
  return (
    <div className="card" style={{ padding: "10px 14px", background: "var(--bg-0)" }}>
      <div className="eyebrow" style={{ marginBottom: 6 }}>Surges</div>
      <div style={{ display: "flex", alignItems: "baseline", justifyContent: "space-between", gap: 8 }}>
        <span className="serif" style={{ fontSize: 28, fontWeight: 600, color: "var(--ember)", lineHeight: 1, textShadow: s > 0 ? "0 0 12px oklch(0.70 0.17 45 / 0.5)" : "none", fontVariantNumeric: "tabular-nums" }}>
          {s}
        </span>
        {canEdit && (
          <div style={{ display: "flex", flexDirection: "column", gap: 2 }}>
            <button className="btn ghost sm" style={{ padding: "1px 8px", borderRadius: 3, fontSize: 11, lineHeight: 1 }} onClick={() => adjust(+1)}>+</button>
            <button className="btn ghost sm" style={{ padding: "1px 8px", borderRadius: 3, fontSize: 11, lineHeight: 1 }} onClick={() => adjust(-1)}>−</button>
          </div>
        )}
      </div>
      <div className="dim mono" style={{ fontSize: 10, marginTop: 4 }}>+{highest} damage per surge</div>
      <div className="dim mono" style={{ fontSize: 10, marginTop: 1 }}>+1 to potency</div>
    </div>
  );
}

// ----- Speed (movement types) -----
function SpeedTile({ c, set, compact = false }) {
  const canEdit = useCanEdit();
  const sp = c.speed || {};
  const setSpeed = (k, v) => set("speed", { ...sp, [k]: Math.max(0, v) });
  const fields = [
    { k: "run", label: "Run" },
    { k: "climb", label: "Climb" },
    { k: "swim", label: "Swim" },
    { k: "fly", label: "Fly" },
  ];
  return (
    <div className="card" style={{ padding: compact ? "10px 12px" : "10px 14px", background: "var(--bg-0)" }}>
      <div className="eyebrow" style={{ marginBottom: 8 }}>Speed</div>
      <div style={{ display: "grid", gridTemplateColumns: "repeat(4, 1fr)", gap: 8 }}>
        {fields.map(f => {
          const val = sp[f.k] ?? 0;
          return (
            <div key={f.k} style={{ textAlign: "center" }}>
              <div className="dim mono" style={{ fontSize: 9, letterSpacing: "0.04em", textTransform: "uppercase", marginBottom: 3 }}>{f.label}</div>
              <div style={{ display: "flex", alignItems: "center", justifyContent: "center", gap: 3 }}>
                {canEdit && <button className="btn ghost sm" style={{ padding: "0 5px", borderRadius: 3, fontSize: 11, lineHeight: 1 }} onClick={() => setSpeed(f.k, val - 1)}>−</button>}
                <span className="serif" style={{ fontSize: compact ? 16 : 20, fontWeight: 600, color: "var(--ink-0)", fontVariantNumeric: "tabular-nums", minWidth: 16 }}>{val}</span>
                {canEdit && <button className="btn ghost sm" style={{ padding: "0 5px", borderRadius: 3, fontSize: 11, lineHeight: 1 }} onClick={() => setSpeed(f.k, val + 1)}>+</button>}
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ----- Section Panels -----

// ----- Shared list-edit helpers + controls for the sheet section panels -----
function RemoveBtn({ onClick, title = "Remove" }) {
  const canEdit = useCanEdit();
  if (!canEdit) return null;
  return (
    <button className="btn ghost sm" title={title} onClick={onClick}
      style={{ padding: "0 7px", borderRadius: 4, color: "var(--blood)", fontSize: 14, lineHeight: 1.3, flexShrink: 0 }}>×</button>
  );
}
function AddBtn({ label, onClick }) {
  const canEdit = useCanEdit();
  if (!canEdit) return null;
  return <button className="btn ghost sm" onClick={onClick}>{label}</button>;
}

function AbilitiesPanel({ c, set }) {
  const canEdit = useCanEdit();
  const tiers = ["Signature", "Heroic", "Triggered"];
  const abilities = c.abilities || [];
  const addAbility = () => set("abilities", [...abilities, { name: "New Ability", tier: "Signature", type: "Action", cost: "", keywords: "", trigger: "", text: "" }]);
  const updateAt = (gi, patch) => set("abilities", abilities.map((a, j) => j === gi ? { ...a, ...patch } : a));
  const removeAt = (gi) => set("abilities", abilities.filter((_, j) => j !== gi));
  return (
    <div>
      <SectionH eyebrow="The Arsenal" title="Abilities & Powers" action={<AddBtn label="+ Ability" onClick={addAbility}/>}/>
      {abilities.length === 0 && !canEdit && (
        <div className="muted italic serif" style={{ fontSize: 14, padding: "20px 0", textAlign: "center" }}>No abilities recorded.</div>
      )}
      <div style={{ display: "flex", flexDirection: "column", gap: 18 }}>
        {tiers.map(tier => {
          const list = abilities.map((a, gi) => ({ a, gi })).filter(x => x.a.tier === tier);
          if (!list.length) return null;
          return (
            <div key={tier}>
              <div className="flourish" style={{ justifyContent: "flex-start", marginBottom: 10 }}>{tier}</div>
              <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(360px, 1fr))", gap: 12 }}>
                {list.map(({ a, gi }) => (
                  <AbilityCard key={gi} ability={a} tiers={tiers}
                    onChange={patch => updateAt(gi, patch)} onRemove={() => removeAt(gi)}/>
                ))}
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

function AbilityCard({ ability: a, tiers, onChange, onRemove }) {
  const canEdit = useCanEdit();
  return (
    <div className="card" style={{ padding: "14px 16px", background: "var(--bg-2)" }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", marginBottom: 4, gap: 8 }}>
        <div className="serif" style={{ fontSize: 17, fontWeight: 600, color: "var(--ink-0)", flex: 1 }}>
          <Editable value={a.name} onChange={v => onChange({ name: v })} placeholder="Ability name"/>
        </div>
        <div className="dim mono" style={{ fontSize: 10 }}>
          <Editable value={a.type} onChange={v => onChange({ type: v })} placeholder="Type"/>
        </div>
        <RemoveBtn onClick={onRemove}/>
      </div>
      {canEdit && (
        <div style={{ marginBottom: 8 }}>
          <select value={a.tier} onChange={e => onChange({ tier: e.target.value })}
            className="btn ghost sm" style={{ fontSize: 11, padding: "2px 6px" }}>
            {tiers.map(t => <option key={t} value={t}>{t}</option>)}
          </select>
        </div>
      )}
      <div style={{ display: "flex", gap: 8, flexWrap: "wrap", marginBottom: 8, alignItems: "center" }}>
        {(a.cost || canEdit) && <Pill tone="ember"><Editable value={a.cost} onChange={v => onChange({ cost: v })} placeholder="Cost"/></Pill>}
        {(a.keywords || canEdit) && <span className="dim mono" style={{ fontSize: 10 }}><Editable value={a.keywords} onChange={v => onChange({ keywords: v })} placeholder="keywords"/></span>}
      </div>
      {(a.trigger || canEdit) && (
        <div style={{ fontSize: 12, color: "var(--ink-2)", fontStyle: "italic", marginBottom: 6 }}>
          <span className="eyebrow" style={{ marginRight: 6 }}>Trigger</span>
          <Editable value={a.trigger} onChange={v => onChange({ trigger: v })} placeholder="—"/>
        </div>
      )}
      {a.potency && <PotencyStrip potency={a.potency}/>}
      <div style={{ fontSize: 13, color: "var(--ink-1)", lineHeight: 1.55 }}>
        <Editable multiline value={a.text} onChange={v => onChange({ text: v })} placeholder="Describe the ability…"/>
      </div>
    </div>
  );
}

function PotencyStrip({ potency }) {

// ----- Skills & Perks panel -----
function SkillsPerksPanel({ c, set }) {
  const canEdit = useCanEdit();
  const skills = c.skills || [];
  const perks = c.perks || [];
  const groups = ["Crafting", "Exploration", "Interpersonal", "Intrigue", "Lore"];
  const [newGroup, setNewGroup] = useState(groups[0]);
  const toggleEdge = (i) => {
    const next = [...skills];
    next[i] = { ...next[i], edge: !next[i].edge };
    set("skills", next);
  };
  const addSkill = () => set("skills", [...skills, { name: "New skill", group: newGroup, edge: false }]);
  const setSkill = (i, patch) => set("skills", skills.map((s, j) => j === i ? { ...s, ...patch } : s));
  const removeSkill = (i) => set("skills", skills.filter((_, j) => j !== i));
  const addPerk = () => set("perks", [...perks, { name: "New perk", text: "" }]);
  const setPerk = (i, patch) => set("perks", perks.map((p, j) => j === i ? { ...p, ...patch } : p));
  const removePerk = (i) => set("perks", perks.filter((_, j) => j !== i));
  const traits = c.ancestryTraits || [];
  const addTrait = () => set("ancestryTraits", [...traits, { name: "New trait", text: "" }]);
  const setTrait = (i, patch) => set("ancestryTraits", traits.map((t, j) => j === i ? { ...t, ...patch } : t));
  const removeTrait = (i) => set("ancestryTraits", traits.filter((_, j) => j !== i));
  const renderSkillRow = (s) => (
    <div key={s._i} style={{ display: "flex", alignItems: "center", gap: 10, padding: "6px 8px", borderBottom: "1px solid var(--line)" }}>
      <button onClick={canEdit ? () => toggleEdge(s._i) : undefined} title={canEdit ? "Edge" : undefined} style={{
        width: 18, height: 18, padding: 0, flexShrink: 0,
        border: `1.5px solid ${s.edge ? "var(--ember)" : "var(--line-strong)"}`,
        background: s.edge ? "var(--ember)" : "transparent",
        borderRadius: 3, cursor: canEdit ? "pointer" : "default",
        color: "var(--bg-0)", fontSize: 11, fontWeight: 700, lineHeight: 1,
        boxShadow: s.edge ? "0 0 6px var(--ember-glow)" : "none",
      }}>{s.edge ? "✓" : ""}</button>
      <span className="serif" style={{ fontSize: 14, color: "var(--ink-0)", flex: 1, minWidth: 0 }}>
        <Editable value={s.name} onChange={v => setSkill(s._i, { name: v })} placeholder="Skill"/>
      </span>
      {canEdit && (
        <select value={groups.includes(s.group) ? s.group : ""} onChange={e => setSkill(s._i, { group: e.target.value })}
          className="btn ghost sm" style={{ fontSize: 11, padding: "2px 4px", flexShrink: 0 }}>
          {!groups.includes(s.group) && <option value="">—</option>}
          {groups.map(g => <option key={g} value={g}>{g}</option>)}
        </select>
      )}
      <span className="mono" style={{ fontSize: 9, color: s.edge ? "var(--ember)" : "var(--ink-2)", letterSpacing: "0.06em", textTransform: "uppercase", flexShrink: 0 }}>{s.edge ? "Edge" : "Trained"}</span>
      <RemoveBtn onClick={() => removeSkill(s._i)}/>
    </div>
  );
  return (
    <div>
      <SectionH eyebrow="Trained & Honed" title="Skills, Perks, & Traits"/>
      <div style={{ display: "grid", gridTemplateColumns: "1.4fr 1fr", gap: 24 }}>
        <div>
          <div className="flourish" style={{ justifyContent: "space-between", marginBottom: 10 }}>
            <span>Skills</span>
            {canEdit && (
              <span style={{ display: "flex", alignItems: "center", gap: 6 }}>
                <select value={newGroup} onChange={e => setNewGroup(e.target.value)}
                  className="btn ghost sm" style={{ fontSize: 11, padding: "2px 6px" }}>
                  {groups.map(g => <option key={g} value={g}>{g}</option>)}
                </select>
                <button className="btn ghost sm" onClick={addSkill}>+ Skill</button>
              </span>
            )}
          </div>
          {skills.length === 0 ? (
            <div className="muted italic serif" style={{ fontSize: 14, padding: "12px 0" }}>No trained skills.</div>
          ) : (
            <div style={{ display: "flex", flexDirection: "column", gap: 4 }}>
              {groups.map(g => {
                const list = skills.map((s, i) => ({ ...s, _i: i })).filter(s => s.group === g);
                if (!list.length) return null;
                return (
                  <div key={g} style={{ marginBottom: 8 }}>
                    <div className="dim mono" style={{ fontSize: 10, letterSpacing: "0.06em", textTransform: "uppercase", marginBottom: 4 }}>{g}</div>
                    {list.map(renderSkillRow)}
                  </div>
                );
              })}
              {/* skills with an unrecognized/blank group */}
              {(() => {
                const others = skills.map((s, i) => ({ ...s, _i: i })).filter(s => !groups.includes(s.group));
                if (!others.length) return null;
                return (
                  <div style={{ marginBottom: 8 }}>
                    <div className="dim mono" style={{ fontSize: 10, letterSpacing: "0.06em", textTransform: "uppercase", marginBottom: 4 }}>Other</div>
                    {others.map(renderSkillRow)}
                  </div>
                );
              })()}
            </div>
          )}
        </div>
        <div>
          <div className="flourish" style={{ justifyContent: "space-between", marginBottom: 10 }}>
            <span>Perks</span><AddBtn label="+ Perk" onClick={addPerk}/>
          </div>
          {perks.length === 0 ? (
            <div className="muted italic serif" style={{ fontSize: 14, padding: "12px 0" }}>No perks taken.</div>
          ) : (
            <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
              {perks.map((p, i) => (
                <div key={i} style={{ padding: "10px 12px", border: "1px solid var(--line)", borderLeft: "2px solid var(--gold)", background: "var(--bg-2)", borderRadius: "0 6px 6px 0" }}>
                  <div style={{ display: "flex", justifyContent: "space-between", gap: 8, marginBottom: 3 }}>
                    <div className="serif" style={{ fontSize: 14, color: "var(--ink-0)", fontWeight: 600, flex: 1 }}>
                      <Editable value={p.name} onChange={v => setPerk(i, { name: v })} placeholder="Perk name"/>
                    </div>
                    <RemoveBtn onClick={() => removePerk(i)}/>
                  </div>
                  <div style={{ fontSize: 12, color: "var(--ink-1)", lineHeight: 1.5 }}>
                    <Editable multiline value={p.text} onChange={v => setPerk(i, { text: v })} placeholder="What the perk does…"/>
                  </div>
                </div>
              ))}
            </div>
          )}
        </div>
      </div>

      {/* Ancestry Traits */}
      <div style={{ marginTop: 24 }}>
        <div className="flourish" style={{ justifyContent: "space-between", marginBottom: 10 }}>
          <span>Ancestry Traits</span><AddBtn label="+ Trait" onClick={addTrait}/>
        </div>
        {traits.length === 0 ? (
          <div className="muted italic serif" style={{ fontSize: 14, padding: "12px 0" }}>No ancestry traits.</div>
        ) : (
          <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(280px, 1fr))", gap: 10 }}>
            {traits.map((t, i) => (
              <div key={i} style={{ padding: "10px 12px", border: "1px solid var(--line)", borderLeft: "2px solid var(--arcane)", background: "var(--bg-2)", borderRadius: "0 6px 6px 0" }}>
                <div style={{ display: "flex", justifyContent: "space-between", gap: 8, marginBottom: 3 }}>
                  <div className="serif" style={{ fontSize: 14, color: "var(--ink-0)", fontWeight: 600, flex: 1 }}>
                    <Editable value={t.name} onChange={v => setTrait(i, { name: v })} placeholder="Trait name"/>
                  </div>
                  <RemoveBtn onClick={() => removeTrait(i)}/>
                </div>
                <div style={{ fontSize: 12, color: "var(--ink-1)", lineHeight: 1.5 }}>
                  <Editable multiline value={t.text} onChange={v => setTrait(i, { text: v })} placeholder="What the trait does…"/>
                </div>
              </div>
            ))}
          </div>
        )}
      </div>
    </div>
  );
}

// ----- Downtime projects -----
function ProjectsPanel({ c, set }) {
  const canEdit = useCanEdit();
  const projects = c.projects || [];
  const adjust = (i, delta) => {
    const next = [...projects];
    next[i] = { ...next[i], progress: Math.max(0, Math.min(next[i].goal, next[i].progress + delta)) };
    set("projects", next);
  };
  const setProject = (i, patch) => set("projects", projects.map((p, j) => j === i ? { ...p, ...patch } : p));
  const addProject = () => set("projects", [...projects, { name: "New project", goal: 10, progress: 0, characteristic: "" }]);
  const removeProject = (i) => set("projects", projects.filter((_, j) => j !== i));
  return (
    <div>
      <SectionH eyebrow="Between sessions" title="Downtime Projects" action={<AddBtn label="+ Project" onClick={addProject}/>}/>
      {projects.length === 0 ? (
        <div className="muted italic serif" style={{ fontSize: 14, padding: "20px 0", textAlign: "center" }}>Nothing in the workshop.</div>
      ) : (
        <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
          {projects.map((p, i) => {
            const pct = Math.max(0, Math.min(100, (p.progress / p.goal) * 100));
            const done = p.progress >= p.goal;
            return (
              <div key={i} style={{ padding: "12px 14px", border: "1px solid var(--line)", borderRadius: 6, background: "var(--bg-2)" }}>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", marginBottom: 6, gap: 12 }}>
                  <div className="serif" style={{ fontSize: 15, color: "var(--ink-0)", fontWeight: 600, flex: 1 }}>
                    <Editable value={p.name} onChange={v => setProject(i, { name: v })} placeholder="Project name"/>
                  </div>
                  <div style={{ display: "flex", alignItems: "baseline", gap: 8 }}>
                    <span className="dim mono" style={{ fontSize: 10 }}>
                      <Editable value={p.characteristic} onChange={v => setProject(i, { characteristic: v })} placeholder="—"/>
                    </span>
                    {canEdit && <button className="btn ghost sm" style={{ padding: "1px 7px", borderRadius: 3, fontSize: 11 }} onClick={() => adjust(i, -1)}>−</button>}
                    {canEdit && <button className="btn ghost sm" style={{ padding: "1px 7px", borderRadius: 3, fontSize: 11 }} onClick={() => adjust(i, +1)}>+</button>}
                    <span className="serif" style={{ fontSize: 15, color: done ? "var(--moss)" : "var(--ink-0)", fontWeight: 600, fontVariantNumeric: "tabular-nums" }}>
                      {p.progress}<span className="dim" style={{ fontSize: 12 }}> / {p.goal}</span>
                    </span>
                    <MaxControl label="Goal" value={p.goal} min={1} onChange={v => setProject(i, { goal: v })}/>
                    <RemoveBtn onClick={() => removeProject(i)}/>
                  </div>
                </div>
                <div className="bar" style={{ height: 6 }}>
                  <div className="fill" style={{
                    width: `${pct}%`,
                    background: done ? "var(--moss)" : "linear-gradient(90deg, oklch(0.55 0.10 80), var(--gold))",
                  }}/>
                </div>
                {done && <div className="mono" style={{ fontSize: 10, color: "var(--moss)", marginTop: 4, letterSpacing: "0.06em", textTransform: "uppercase" }}>● Complete</div>}
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

          const qty = it.qty ?? 1;
          return (
            <div key={i} style={{ display: "grid", gridTemplateColumns: cols, gap: 14, padding: "10px 4px", borderBottom: "1px solid var(--line)", alignItems: "center" }}>
              <div className="serif" style={{ fontSize: 15, color: "var(--ink-0)" }}>
                <Editable value={it.name} onChange={v => setItem(i, { name: v })} placeholder="Item"/>
              </div>
              <div className="muted italic serif" style={{ fontSize: 13 }}>
                <Editable value={it.note} onChange={v => setItem(i, { note: v })} placeholder="—"/>
              </div>
              <div style={{ display: "flex", flexDirection: "column", gap: 4 }}>
                <CheckToggle checked={!!it.consumable} onToggle={() => setItem(i, { consumable: !it.consumable })} label="Consumable" tone="ember"/>
                <CheckToggle checked={!!it.attuned} onToggle={() => setItem(i, { attuned: !it.attuned })} label="Attuned" tone="moss"/>
              </div>
              <div style={{ display: "flex", alignItems: "center", justifyContent: "center", gap: 6 }}>
                {canEdit && <button className="btn ghost sm" style={{ padding: "0 6px", borderRadius: 4 }} onClick={() => setQty(i, qty - 1)}>−</button>}
                <span className="serif" style={{ fontSize: 15, color: "var(--ink-0)", fontVariantNumeric: "tabular-nums", minWidth: 18, textAlign: "center" }}>×{qty}</span>
                {canEdit && <button className="btn ghost sm" style={{ padding: "0 6px", borderRadius: 4 }} onClick={() => setQty(i, qty + 1)}>+</button>}
              </div>
              <RemoveBtn onClick={() => removeItem(i)}/>
            </div>
          );
        })}
      </div>
    </div>
  );
}

function TiesPanel({ c, set }) {
  const canEdit = useCanEdit();
  const ties = c.ties || [];
  const goals = c.goals || [];
  const setTie = (i, patch) => set("ties", ties.map((t, j) => j === i ? { ...t, ...patch } : t));

  const removeTie = (i) => set("ties", ties.filter((_, j) => j !== i));
  const setGoal = (i, v) => set("goals", goals.map((g, j) => j === i ? v : g));
  const addGoal = () => set("goals", [...goals, "New goal"]);
  const removeGoal = (i) => set("goals", goals.filter((_, j) => j !== i));
  return (
    <div>
      <SectionH eyebrow="The Web" title="Ties & Backstory"/>
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 20 }}>
        <div>
          <div className="flourish" style={{ justifyContent: "space-between", marginBottom: 10 }}>
            <span>Ties</span><AddBtn label="+ Tie" onClick={addTie}/>
          </div>
          <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
            {ties.map((t, i) => (

                <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 2, gap: 8 }}>
                  <span className="serif" style={{ fontSize: 14, color: "var(--ink-0)", fontWeight: 600, flex: 1 }}>

                  </span>
                  <span className="dim mono" style={{ fontSize: 10 }}>
                    <Editable value={t.how} onChange={v => setTie(i, { how: v })} placeholder="how"/>

                  <RemoveBtn onClick={() => removeTie(i)}/>

                  <Editable multiline value={t.note} onChange={v => setTie(i, { note: v })} placeholder="Notes on this tie…"/>

              </div>
            ))}
          </div>
        </div>
        <div>
          <div className="flourish" style={{ justifyContent: "flex-start", marginBottom: 10 }}>Story</div>
          <div className="serif italic" style={{ fontSize: 14, color: "var(--ink-1)", lineHeight: 1.65, marginBottom: 16, padding: "0 4px" }}>
            "<Editable multiline value={c.backstory} onChange={v => set("backstory", v)} placeholder="Their backstory…"/>"
          </div>
          <div className="flourish" style={{ justifyContent: "space-between", marginBottom: 10 }}>
            <span>Goals</span><AddBtn label="+ Goal" onClick={addGoal}/>

                <span style={{ color: "var(--ember)", fontFamily: "var(--font-display)" }}>✦</span>
                <span style={{ flex: 1 }}><Editable value={g} onChange={v => setGoal(i, v)} placeholder="A goal"/></span>
                <RemoveBtn onClick={() => removeGoal(i)}/>

}

function ConditionsPanel({ c, set }) {
  const conditions = c.conditions || [];
  const setCond = (i, patch) => set("conditions", conditions.map((cd, j) => j === i ? { ...cd, ...patch } : cd));
  const addCond = () => set("conditions", [...conditions, { name: "Condition", duration: "", source: "" }]);
  const removeCond = (i) => set("conditions", conditions.filter((_, j) => j !== i));

    <div>
      <SectionH eyebrow="The State of Things" title="Conditions & Notes" action={<AddBtn label="+ Condition" onClick={addCond}/>}/>
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 20 }}>
        <div>
          <div className="flourish" style={{ justifyContent: "flex-start", marginBottom: 10 }}>Conditions</div>
          {conditions.length === 0 ? (
            <div className="muted italic serif" style={{ fontSize: 14, padding: "20px 0", textAlign: "center" }}>None — for now.</div>
          ) : (
            <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
              {conditions.map((cond, i) => (
                <div key={i} style={{ padding: "10px 12px", border: "1px solid oklch(0.42 0.10 25)", background: "oklch(0.30 0.08 25 / 0.20)", borderRadius: 6 }}>
                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", gap: 8 }}>

                    <span className="dim mono" style={{ fontSize: 10 }}>
                      <Editable value={cond.duration} onChange={v => setCond(i, { duration: v })} placeholder="duration"/>

                  </div>

              ))}

          )}

        <div>
          <DamageList

          />
          <div style={{ height: 16 }}></div>
          <DamageList
            title="Immunities" tone="moss" listKey="immunities" set={set}
            items={c.immunities || []}
            empty="Vulnerable to all." sign="−" sub="damage reduced"

        <div>
          <div className="flourish" style={{ justifyContent: "flex-start", marginBottom: 10 }}>Notes</div>
          <div style={{ padding: "0 4px" }}>
            <Editable multiline value={c.notes} onChange={v => set("notes", v)} placeholder="Anything worth remembering…"

          </div>
        </div>
      </div>
    </div>
  );
}

function DamageList({ title, tone, items, empty, sign, sub, listKey, set }) {
  const canEdit = useCanEdit();
  const colors = tone === "blood"
    ? { border: "oklch(0.42 0.10 25)", bg: "oklch(0.30 0.08 25 / 0.20)", text: "var(--blood)" }
    : { border: "oklch(0.40 0.06 140)", bg: "oklch(0.30 0.05 140 / 0.20)", text: "var(--moss)" };
  const setItem = (i, patch) => set(listKey, items.map((it, j) => j === i ? { ...it, ...patch } : it));
  const addItem = () => set(listKey, [...items, { type: "Damage", value: 1 }]);
  const removeItem = (i) => set(listKey, items.filter((_, j) => j !== i));
  return (
    <div>
      <div className="flourish" style={{ justifyContent: "space-between", marginBottom: 10 }}>
        <span>{title}</span>{set && <AddBtn label="+" onClick={addItem}/>}
      </div>
      {items.length === 0 ? (
        <div className="muted italic serif" style={{ fontSize: 13, padding: "12px 0" }}>{empty}</div>
      ) : (
        <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
          {items.map((it, i) => (
            <div key={i} style={{
              display: "grid", gridTemplateColumns: "1fr auto auto", alignItems: "center", gap: 12,
              padding: "8px 12px", border: `1px solid ${colors.border}`,
              background: colors.bg, borderRadius: 6,
            }}>
              <div>
                <div className="serif" style={{ fontSize: 14, color: "var(--ink-0)", fontWeight: 600 }}>
                  <Editable value={it.type} onChange={v => setItem(i, { type: v })} placeholder="Type"/>
                </div>
                <div className="dim mono" style={{ fontSize: 10, marginTop: 1 }}>{sub}</div>
              </div>
              <div className="serif" style={{ fontSize: 22, fontWeight: 600, color: colors.text, fontVariantNumeric: "tabular-nums", lineHeight: 1, display: "flex", alignItems: "center", gap: 4 }}>
                {sign}{it.value}
                {canEdit && (
                  <span style={{ display: "flex", flexDirection: "column" }}>
                    <button className="btn ghost sm" style={{ padding: "0 5px", borderRadius: 3, fontSize: 10, lineHeight: 1 }} onClick={() => setItem(i, { value: it.value + 1 })}>+</button>
                    <button className="btn ghost sm" style={{ padding: "0 5px", borderRadius: 3, fontSize: 10, lineHeight: 1 }} onClick={() => setItem(i, { value: Math.max(0, it.value - 1) })}>−</button>
                  </span>
                )}
              </div>
              <RemoveBtn onClick={() => removeItem(i)}/>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

window.CharactersTab = CharactersTab;

// ----- Culture & Career panel -----
function OriginPanel({ c, set }) {
  const canEdit = useCanEdit();
  const culture = c.culture || {};
  const career = c.careerData || {};
  const setCulture = (patch) => set("culture", { ...culture, ...patch });
  const setCareer = (patch) => set("careerData", { ...career, ...patch });
  // Complications are objects { name, benefit, drawback }. Older data may store a plain
  // string — normalize those into the benefit slot so nothing is lost.
  const normComp = (x) => (typeof x === "string" ? { name: "", benefit: x, drawback: "" } : (x || {}));
  const complications = (culture.complications || []).map(normComp);
  const addComplication = () => setCulture({ complications: [...complications, { name: "Complication", benefit: "", drawback: "" }] });
  const setComplication = (i, patch) => setCulture({ complications: complications.map((x, j) => j === i ? { ...x, ...patch } : x) });
  const removeComplication = (i) => setCulture({ complications: complications.filter((_, j) => j !== i) });
  return (
    <div>
      <SectionH eyebrow="Where they come from" title="Culture & Career"/>

      {/* Career card */}
      <div style={{
        padding: "16px 18px", marginBottom: 24,
        border: "1px solid var(--line)", borderLeft: "3px solid var(--gold)",
        background: "linear-gradient(180deg, oklch(0.30 0.03 85 / 0.10), transparent)",
        borderRadius: "0 6px 6px 0",
      }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", marginBottom: 12, gap: 12 }}>
          <div>
            <div className="eyebrow" style={{ marginBottom: 4 }}>Career</div>
            <div className="serif" style={{ fontSize: 22, fontWeight: 600, color: "var(--ink-0)", letterSpacing: "0.005em" }}>
              <Editable value={c.career} onChange={v => set("career", v)} placeholder="Career"/>
            </div>
          </div>
          <div style={{ display: "flex", gap: 6, flexWrap: "wrap", justifyContent: "flex-end", alignItems: "center" }}>
            {(career.skills || []).map((s, i) => <Pill key={i} tone="gold">{s}</Pill>)}
            {canEdit && (
              <span className="dim mono" style={{ fontSize: 10 }}>
                skills: <Editable value={(career.skills || []).join(", ")}
                  onChange={v => setCareer({ skills: v.split(",").map(x => x.trim()).filter(Boolean) })}
                  placeholder="comma, separated"/>
              </span>
            )}
          </div>
        </div>
        {(career.benefits || canEdit) && (
          <div style={{ marginBottom: 14 }}>
            <div className="dim mono" style={{ fontSize: 10, letterSpacing: "0.06em", textTransform: "uppercase", marginBottom: 4 }}>Benefits</div>
            <div style={{ fontSize: 13, color: "var(--ink-1)", lineHeight: 1.55 }}>
              <Editable multiline value={career.benefits} onChange={v => setCareer({ benefits: v })} placeholder="Career benefits…"/>
            </div>
          </div>
        )}
        {(career.perk || canEdit) && (
          <div style={{ marginBottom: 14, padding: "10px 12px", background: "var(--bg-2)", borderRadius: 4, border: "1px solid var(--line)" }}>
            <div className="dim mono" style={{ fontSize: 10, letterSpacing: "0.06em", textTransform: "uppercase", marginBottom: 4, color: "var(--gold)" }}>Career Perk</div>
            <div style={{ fontSize: 13, color: "var(--ink-1)", lineHeight: 1.55 }}>
              <Editable multiline value={career.perk} onChange={v => setCareer({ perk: v })} placeholder="Career perk…"/>
            </div>
          </div>
        )}
        {(career.incident || canEdit) && (
          <div className="serif italic" style={{ fontSize: 14, color: "var(--ink-2)", lineHeight: 1.6, paddingLeft: 12, borderLeft: "2px solid var(--ember-deep)" }}>
            <span className="eyebrow" style={{ marginRight: 8, color: "var(--ember)" }}>Inciting Incident</span>
            <Editable multiline value={career.incident} onChange={v => setCareer({ incident: v })} placeholder="What set them on this path…"/>
          </div>
        )}
      </div>

      {/* Culture & Backgrounds */}
      <div className="flourish" style={{ justifyContent: "flex-start", marginBottom: 14 }}>Culture & Backgrounds</div>
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 16, marginBottom: 16 }}>
        <CultureField label="Environment" value={culture.environment} icon="◐"
          onChange={v => setCulture({ environment: v })}
          benefit={culture.environmentBenefit} onBenefitChange={v => setCulture({ environmentBenefit: v })}/>
        <CultureField label="Organization" value={culture.organization} icon="◇"
          onChange={v => setCulture({ organization: v })}
          benefit={culture.organizationBenefit} onBenefitChange={v => setCulture({ organizationBenefit: v })}/>
        <CultureField label="Upbringing" value={culture.upbringing} icon="✦"
          onChange={v => setCulture({ upbringing: v })}
          benefit={culture.upbringingBenefit} onBenefitChange={v => setCulture({ upbringingBenefit: v })}/>
        <CultureField label="Languages" value={(culture.languages || []).join(" · ")} icon="❝"
          onChange={v => setCulture({ languages: v.split(/[·,\n]/).map(x => x.trim()).filter(Boolean) })}/>
      </div>

      {/* Complications */}
      <div>
        <div className="dim mono" style={{ fontSize: 10, letterSpacing: "0.06em", textTransform: "uppercase", marginBottom: 8, color: "var(--blood)", display: "flex", justifyContent: "space-between" }}>
          <span>Complications</span><AddBtn label="+" onClick={addComplication}/>
        </div>
        {complications.length === 0 ? (
          <div className="muted italic serif" style={{ fontSize: 13, padding: "8px 0" }}>No known complications.</div>
        ) : (
          <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
            {complications.map((comp, i) => (
              <div key={i} style={{
                padding: "10px 12px",
                background: "oklch(0.30 0.06 25 / 0.15)",
                border: "1px solid oklch(0.40 0.08 25)",
                borderRadius: 6,
              }}>
                <div style={{ display: "flex", gap: 8, alignItems: "center", marginBottom: 8 }}>
                  <span style={{ color: "var(--blood)", fontFamily: "var(--font-display)", fontSize: 14, lineHeight: 1.4, flexShrink: 0 }}>※</span>
                  <span className="serif" style={{ fontSize: 14, color: "var(--ink-0)", fontWeight: 600, flex: 1 }}>
                    <Editable value={comp.name} onChange={v => setComplication(i, { name: v })} placeholder="Complication name"/>
                  </span>
                  <RemoveBtn onClick={() => removeComplication(i)}/>
                </div>
                <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
                  <div style={{ padding: "8px 10px", background: "oklch(0.30 0.05 140 / 0.18)", border: "1px solid oklch(0.40 0.06 140)", borderRadius: 4 }}>
                    <div className="dim mono" style={{ fontSize: 10, letterSpacing: "0.06em", textTransform: "uppercase", marginBottom: 4, color: "var(--moss)" }}>Benefit</div>
                    <div className="serif italic" style={{ fontSize: 13, color: "var(--ink-1)", lineHeight: 1.5 }}>
                      <Editable multiline value={comp.benefit} onChange={v => setComplication(i, { benefit: v })} placeholder="What they gain…"/>
                    </div>
                  </div>
                  <div style={{ padding: "8px 10px", background: "oklch(0.30 0.08 25 / 0.18)", border: "1px solid oklch(0.42 0.10 25)", borderRadius: 4 }}>
                    <div className="dim mono" style={{ fontSize: 10, letterSpacing: "0.06em", textTransform: "uppercase", marginBottom: 4, color: "var(--blood)" }}>Drawback</div>
                    <div className="serif italic" style={{ fontSize: 13, color: "var(--ink-1)", lineHeight: 1.5 }}>
                      <Editable multiline value={comp.drawback} onChange={v => setComplication(i, { drawback: v })} placeholder="What it costs them…"/>
                    </div>
                  </div>
                </div>
              </div>
            ))}
          </div>
        )}
      </div>
    </div>
  );
}

function CultureField({ label, value, icon, onChange, benefit, onBenefitChange }) {
  return (
    <div style={{
      padding: "10px 14px",
      border: "1px solid var(--line)",
      background: "var(--bg-2)",
      borderRadius: 6,
    }}>
      <div className="eyebrow" style={{ marginBottom: 4, display: "flex", alignItems: "center", gap: 6 }}>
        <span style={{ color: "var(--ember)", fontFamily: "var(--font-display)", fontSize: 11, opacity: 0.8 }}>{icon}</span>
        {label}

      <div className="serif" style={{ fontSize: 14, color: "var(--ink-0)", lineHeight: 1.4 }}>

        <div style={{ marginTop: 8, paddingTop: 8, borderTop: "1px solid var(--line)" }}>
          <div className="dim mono" style={{ fontSize: 9, letterSpacing: "0.06em", textTransform: "uppercase", marginBottom: 3, color: "var(--moss)" }}>Benefit</div>
          <div style={{ fontSize: 13, color: "var(--ink-1)", lineHeight: 1.45 }}>
            <Editable multiline value={benefit} onChange={onBenefitChange} placeholder="What it grants…"/>

}
