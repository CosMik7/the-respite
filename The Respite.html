<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>The Respite</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
/* The Respite — Obsidian & Ember theme */

@import url('https://fonts.googleapis.com/css2?family=UnifrakturCook:wght@700&family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');

:root {
  /* Obsidian (default) */
  --bg-0: oklch(0.14 0.005 60);
  --bg-1: oklch(0.18 0.008 60);
  --bg-2: oklch(0.22 0.010 60);
  --bg-3: oklch(0.26 0.012 60);
  --ink-0: oklch(0.96 0.012 80);
  --ink-1: oklch(0.84 0.014 80);
  --ink-2: oklch(0.66 0.012 80);
  --ink-3: oklch(0.50 0.010 80);
  --line: oklch(0.32 0.010 60);
  --line-strong: oklch(0.42 0.012 60);

  --ember: oklch(0.70 0.17 45);
  --ember-soft: oklch(0.55 0.12 45);
  --ember-deep: oklch(0.40 0.10 45);
  --ember-glow: oklch(0.75 0.18 50);

  --gold: oklch(0.80 0.11 85);
  --gold-soft: oklch(0.65 0.08 85);

  --blood: oklch(0.50 0.14 25);
  --moss: oklch(0.55 0.07 140);
  --arcane: oklch(0.60 0.10 280);

  --font-display: "UnifrakturCook", "Cormorant Garamond", serif;
  --font-serif: "Cormorant Garamond", "EB Garamond", Georgia, serif;
  --font-sans: "Inter", system-ui, sans-serif;
  --font-mono: "JetBrains Mono", ui-monospace, monospace;

  --radius-sm: 4px;
  --radius: 6px;
  --radius-lg: 10px;

  --shadow-1: 0 1px 0 0 oklch(0.30 0.010 60 / 0.4);
  --shadow-2: 0 8px 24px -8px oklch(0 0 0 / 0.7), 0 1px 0 0 oklch(0.30 0.010 60 / 0.4);
  --shadow-glow: 0 0 24px -4px oklch(0.70 0.17 45 / 0.35);
}

/* Theme: Inn at dusk (warm parchment) */
[data-theme="inn"] {
  --bg-0: oklch(0.18 0.020 60);
  --bg-1: oklch(0.22 0.025 55);
  --bg-2: oklch(0.27 0.028 55);
  --bg-3: oklch(0.32 0.030 55);
  --ink-0: oklch(0.94 0.025 80);
  --ink-1: oklch(0.82 0.030 75);
  --ink-2: oklch(0.62 0.025 70);
  --ink-3: oklch(0.48 0.020 70);
  --line: oklch(0.36 0.025 55);
  --line-strong: oklch(0.48 0.030 55);
  --ember: oklch(0.72 0.16 55);
}

/* Theme: Arcane tome */
[data-theme="arcane"] {
  --bg-0: oklch(0.16 0.040 265);
  --bg-1: oklch(0.20 0.045 265);
  --bg-2: oklch(0.25 0.050 265);
  --bg-3: oklch(0.30 0.052 265);
  --ink-0: oklch(0.95 0.020 90);
  --ink-1: oklch(0.85 0.025 85);
  --ink-2: oklch(0.65 0.030 270);
  --ink-3: oklch(0.50 0.030 270);
  --line: oklch(0.34 0.045 265);
  --line-strong: oklch(0.46 0.050 265);
  --ember: oklch(0.80 0.13 85); /* swap to gold leaf */
  --gold: oklch(0.82 0.13 85);
}

/* Theme: Wilderness */
[data-theme="wild"] {
  --bg-0: oklch(0.18 0.018 150);
  --bg-1: oklch(0.22 0.020 150);
  --bg-2: oklch(0.27 0.024 150);
  --bg-3: oklch(0.32 0.026 150);
  --ink-0: oklch(0.94 0.015 110);
  --ink-1: oklch(0.82 0.018 110);
  --ink-2: oklch(0.62 0.020 140);
  --ink-3: oklch(0.48 0.018 140);
  --line: oklch(0.36 0.025 145);
  --line-strong: oklch(0.48 0.028 145);
  --ember: oklch(0.68 0.13 60);
}

* { box-sizing: border-box; }

html, body {
  margin: 0;
  padding: 0;
  background: var(--bg-0);
  color: var(--ink-1);
  font-family: var(--font-sans);
  font-size: 14px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
}

body {
  min-height: 100vh;
  background:
    radial-gradient(ellipse 70% 40% at 50% -10%, oklch(0.70 0.17 45 / 0.08), transparent 70%),
    radial-gradient(ellipse 60% 30% at 80% 110%, oklch(0.70 0.17 45 / 0.05), transparent 70%),
    var(--bg-0);
}

button {
  font-family: inherit;
  font-size: inherit;
  color: inherit;
  cursor: pointer;
}

input, textarea, select {
  font-family: inherit;
  color: inherit;
}

/* Display + ornamentation */
.brand-mark {
  font-family: var(--font-display);
  letter-spacing: 0.01em;
}

.flourish {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  color: var(--gold-soft);
  font-family: var(--font-serif);
  font-style: italic;
  font-size: 13px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
}
.flourish::before, .flourish::after {
  content: "";
  flex: 1;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--line-strong), transparent);
  min-width: 24px;
}

/* Hairline gold rule */
.rule {
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--gold-soft), transparent);
  opacity: 0.45;
  margin: 16px 0;
}

/* Cards */
.card {
  background: var(--bg-1);
  border: 1px solid var(--line);
  border-radius: var(--radius);
  position: relative;
  overflow: hidden;
}
.card.with-rail::before {
  content: "";
  position: absolute;
  inset: 0 auto 0 0;
  width: 2px;
  background: linear-gradient(180deg, transparent, var(--ember), transparent);
}
.card-pad { padding: 18px 20px; }

/* Buttons */
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  padding: 8px 14px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--line-strong);
  background: var(--bg-2);
  color: var(--ink-0);
  font-size: 13px;
  font-weight: 500;
  letter-spacing: 0.02em;
  transition: all 0.15s ease;
  text-decoration: none;
}
.btn:hover {
  border-color: var(--ember-soft);
  color: var(--ink-0);
  background: var(--bg-3);
}
.btn.ember {
  background: linear-gradient(180deg, var(--ember) 0%, var(--ember-soft) 100%);
  border-color: var(--ember-deep);
  color: oklch(0.18 0.02 50);
  font-weight: 600;
  text-shadow: 0 1px 0 oklch(0.85 0.10 60 / 0.4);
}
.btn.ember:hover { box-shadow: var(--shadow-glow); }
.btn.ghost {
  background: transparent;
  border-color: var(--line);
  color: var(--ink-2);
}
.btn.ghost:hover { color: var(--ink-0); border-color: var(--line-strong); }
.btn.sm { padding: 5px 10px; font-size: 12px; }
.btn.icon { padding: 7px; aspect-ratio: 1; }

/* Pill */
.pill {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 3px 9px;
  border-radius: 999px;
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 0.05em;
  text-transform: uppercase;
  border: 1px solid var(--line);
  background: var(--bg-2);
  color: var(--ink-2);
}
.pill.ember { color: var(--ember); border-color: var(--ember-deep); background: oklch(0.40 0.10 45 / 0.15); }
.pill.gold { color: var(--gold); border-color: oklch(0.55 0.08 85); background: oklch(0.45 0.06 85 / 0.12); }
.pill.moss { color: var(--moss); border-color: oklch(0.40 0.06 140); background: oklch(0.35 0.05 140 / 0.15); }
.pill.race { color: oklch(0.78 0.05 280); border-color: oklch(0.40 0.06 280); background: oklch(0.30 0.05 280 / 0.20); }
.pill.race::before { content: "⚜"; margin-right: 4px; opacity: 0.7; font-size: 0.85em; }
.pill.dot::before { content: ""; width: 5px; height: 5px; border-radius: 50%; background: currentColor; }

/* Section heading */
.section-h {
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  gap: 16px;
  margin-bottom: 16px;
}
.section-h h2 {
  font-family: var(--font-serif);
  font-weight: 600;
  font-size: 22px;
  margin: 0;
  color: var(--ink-0);
  letter-spacing: 0.005em;
}
.section-h .eyebrow {
  font-family: var(--font-display);
  color: var(--ember);
  font-size: 13px;
  display: block;
  margin-bottom: 4px;
  letter-spacing: 0.02em;
}

/* Editable field */
.editable {
  background: transparent;
  border: 1px solid transparent;
  border-radius: var(--radius-sm);
  padding: 4px 6px;
  margin: -4px -6px;
  transition: all 0.12s ease;
  cursor: text;
  display: inline-block;
  min-width: 40px;
}
.editable:hover { background: var(--bg-2); border-color: var(--line); }
.editable:focus { background: var(--bg-2); border-color: var(--ember); outline: none; }

/* Stat tile */
.stat-tile {
  background: var(--bg-2);
  border: 1px solid var(--line);
  border-radius: var(--radius);
  padding: 12px 10px;
  text-align: center;
  position: relative;
}
.stat-tile .label {
  font-family: var(--font-display);
  color: var(--ink-2);
  font-size: 12px;
  letter-spacing: 0.04em;
  margin-bottom: 4px;
}
.stat-tile .value {
  font-family: var(--font-serif);
  font-size: 32px;
  font-weight: 600;
  color: var(--ink-0);
  line-height: 1;
}
.stat-tile .sub { font-size: 10px; color: var(--ink-3); margin-top: 4px; letter-spacing: 0.05em; text-transform: uppercase; }

/* Top nav */
.topnav {
  position: sticky;
  top: 0;
  z-index: 50;
  background: oklch(0.14 0.005 60 / 0.85);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  border-bottom: 1px solid var(--line);
}
.topnav-inner {
  max-width: 1280px;
  margin: 0 auto;
  padding: 0 28px;
  display: flex;
  align-items: center;
  gap: 32px;
  height: 64px;
}
.brand {
  display: flex;
  align-items: center;
  gap: 10px;
}
.brand-sigil {
  width: 30px;
  height: 30px;
  border: 1px solid var(--ember);
  border-radius: 50%;
  display: grid;
  place-items: center;
  position: relative;
  background: radial-gradient(circle at 50% 60%, oklch(0.70 0.17 45 / 0.5), transparent 70%);
}
.brand-sigil::after {
  content: "";
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--ember);
  box-shadow: 0 0 8px var(--ember-glow);
}
.brand-name {
  font-family: var(--font-display);
  font-size: 22px;
  color: var(--ink-0);
  line-height: 1;
}
.brand-tag {
  font-family: var(--font-serif);
  font-style: italic;
  font-size: 12px;
  color: var(--ink-3);
  letter-spacing: 0.08em;
  margin-top: 2px;
}

.tabs {
  display: flex;
  gap: 4px;
  margin-left: auto;
}
.tab {
  padding: 8px 16px;
  background: transparent;
  border: 0;
  color: var(--ink-2);
  font-size: 13px;
  font-weight: 500;
  letter-spacing: 0.04em;
  position: relative;
  font-family: var(--font-sans);
  text-transform: uppercase;
}
.tab:hover { color: var(--ink-0); }
.tab.active { color: var(--ember); }
.tab.active::after {
  content: "";
  position: absolute;
  left: 16px; right: 16px;
  bottom: -1px;
  height: 2px;
  background: var(--ember);
  box-shadow: 0 0 8px var(--ember-glow);
}

.user-chip {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 4px 10px 4px 4px;
  border: 1px solid var(--line);
  border-radius: 999px;
  background: var(--bg-1);
  cursor: pointer;
  transition: all 0.15s;
}
.user-chip:hover { border-color: var(--ember-soft); }

.avatar {
  width: 28px;
  height: 28px;
  border-radius: 50%;
  background: var(--bg-3);
  border: 1px solid var(--line-strong);
  display: grid;
  place-items: center;
  font-family: var(--font-serif);
  font-weight: 600;
  font-size: 13px;
  color: var(--ink-0);
  flex-shrink: 0;
  position: relative;
  overflow: hidden;
}
.avatar.lg { width: 56px; height: 56px; font-size: 22px; }
.avatar.xl { width: 84px; height: 84px; font-size: 32px; }
.avatar.ember { background: linear-gradient(135deg, var(--ember-soft), var(--ember-deep)); color: oklch(0.95 0.02 80); border-color: var(--ember); }
.avatar.gold { background: linear-gradient(135deg, var(--gold), var(--gold-soft)); color: oklch(0.20 0.02 80); border-color: var(--gold); }
.avatar.moss { background: linear-gradient(135deg, var(--moss), oklch(0.40 0.06 140)); color: oklch(0.95 0.01 110); border-color: var(--moss); }
.avatar.blood { background: linear-gradient(135deg, var(--blood), oklch(0.35 0.10 25)); color: oklch(0.95 0.02 60); border-color: var(--blood); }
.avatar.arcane { background: linear-gradient(135deg, var(--arcane), oklch(0.40 0.08 280)); color: oklch(0.95 0.02 280); border-color: var(--arcane); }
.avatar.teal { background: linear-gradient(135deg, oklch(0.55 0.10 195), oklch(0.38 0.08 200)); color: oklch(0.96 0.02 200); border-color: oklch(0.62 0.11 195); }
.avatar.sapphire { background: linear-gradient(135deg, oklch(0.52 0.13 255), oklch(0.34 0.11 260)); color: oklch(0.96 0.02 255); border-color: oklch(0.60 0.14 255); }
.avatar.amethyst { background: linear-gradient(135deg, oklch(0.52 0.14 310), oklch(0.35 0.11 312)); color: oklch(0.96 0.02 310); border-color: oklch(0.60 0.15 310); }
.avatar.rose { background: linear-gradient(135deg, oklch(0.62 0.16 5), oklch(0.43 0.13 10)); color: oklch(0.97 0.02 5); border-color: oklch(0.68 0.17 5); }
.avatar.copper { background: linear-gradient(135deg, oklch(0.58 0.11 55), oklch(0.40 0.09 50)); color: oklch(0.97 0.02 70); border-color: oklch(0.64 0.12 55); }
.avatar.jade { background: linear-gradient(135deg, oklch(0.56 0.11 165), oklch(0.38 0.09 165)); color: oklch(0.96 0.02 165); border-color: oklch(0.63 0.12 165); }
.avatar.slate { background: linear-gradient(135deg, oklch(0.50 0.03 255), oklch(0.33 0.02 255)); color: oklch(0.95 0.01 255); border-color: oklch(0.58 0.03 255); }
.avatar.frost { background: linear-gradient(135deg, oklch(0.70 0.08 220), oklch(0.50 0.07 225)); color: oklch(0.18 0.02 240); border-color: oklch(0.76 0.09 220); }
.avatar.bone { background: linear-gradient(135deg, oklch(0.86 0.03 85), oklch(0.72 0.04 80)); color: oklch(0.25 0.02 80); border-color: oklch(0.80 0.04 85); }
.avatar.ink { background: linear-gradient(135deg, oklch(0.34 0.02 280), oklch(0.20 0.01 280)); color: oklch(0.92 0.01 280); border-color: oklch(0.46 0.03 280); }

/* Page shell */
.page {
  max-width: 1280px;
  margin: 0 auto;
  padding: 32px 28px 80px;
}

/* Striped placeholder */
.placeholder {
  background:
    repeating-linear-gradient(
      135deg,
      var(--bg-2) 0,
      var(--bg-2) 6px,
      var(--bg-1) 6px,
      var(--bg-1) 12px
    );
  border: 1px dashed var(--line-strong);
  border-radius: var(--radius);
  display: grid;
  place-items: center;
  color: var(--ink-3);
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: 0.06em;
  text-transform: uppercase;
}

/* Resource pip / track */
.pip-track {
  display: flex;
  flex-wrap: wrap;
  gap: 4px;
}
.pip-track .pip { flex: 0 0 auto; }
.pip {
  width: 14px;
  height: 14px;
  border-radius: 50%;
  border: 1px solid var(--line-strong);
  background: var(--bg-2);
  cursor: pointer;
  transition: all 0.12s;
}
.pip.filled {
  background: var(--ember);
  border-color: var(--ember-deep);
  box-shadow: 0 0 6px var(--ember-glow);
}
.pip:hover { transform: scale(1.15); }

/* Bar */
.bar {
  height: 8px;
  background: var(--bg-2);
  border: 1px solid var(--line);
  border-radius: 999px;
  overflow: hidden;
  position: relative;
}
.bar > .fill {
  height: 100%;
  background: linear-gradient(90deg, var(--blood), var(--ember));
  border-radius: 999px;
  transition: width 0.4s ease;
}

/* Scrollbar */
::-webkit-scrollbar { width: 10px; height: 10px; }
::-webkit-scrollbar-track { background: var(--bg-0); }
::-webkit-scrollbar-thumb { background: var(--bg-3); border-radius: 999px; border: 2px solid var(--bg-0); }
::-webkit-scrollbar-thumb:hover { background: var(--line-strong); }

/* Misc */
.muted { color: var(--ink-2); }
.dim { color: var(--ink-3); }
.serif { font-family: var(--font-serif); }
.display { font-family: var(--font-display); }
.mono { font-family: var(--font-mono); }
.italic { font-style: italic; }
.row { display: flex; gap: 12px; align-items: center; }
.col { display: flex; flex-direction: column; gap: 12px; }
.grow { flex: 1; }
.eyebrow {
  font-family: var(--font-display);
  font-size: 12px;
  color: var(--ember);
  letter-spacing: 0.04em;
}

textarea.editable, input.editable {
  width: 100%;
  font: inherit;
  resize: vertical;
}

.kbd {
  font-family: var(--font-mono);
  font-size: 10px;
  padding: 1px 5px;
  border-radius: 3px;
  background: var(--bg-2);
  border: 1px solid var(--line);
  color: var(--ink-2);
}

/* Tooltip-ish hover */
@keyframes ember-pulse {
  0%, 100% { opacity: 0.6; }
  50% { opacity: 1; }
}
.pulse { animation: ember-pulse 2s ease-in-out infinite; }

/* ───────────────────────── Mobile / small screens ─────────────────────────
   The app is built with inline grid styles, so most layout overrides here need
   !important to win against the element's own style attribute. The selectors
   match on the CSS property name (reliable) and known value fragments. */
@media (max-width: 768px) {
  html, body { max-width: 100%; overflow-x: hidden; }

  /* Top navigation: brand + user on row 1, tabs scroll horizontally on row 2 */
  .topnav-inner {
    padding: 8px 14px;
    gap: 10px 14px;
    height: auto;
    flex-wrap: wrap;
  }
  .brand-tag { display: none; }
  .brand-name { font-size: 19px; }
  .tabs {
    order: 4;
    width: 100%;
    margin-left: 0;
    gap: 2px;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
    padding-bottom: 2px;
  }
  .tabs::-webkit-scrollbar { height: 0; }
  .tab { padding: 7px 11px; font-size: 12px; white-space: nowrap; flex: 0 0 auto; }
  /* push the user/sign-out cluster (last child) to the right of row 1 */
  .topnav-inner > div:last-of-type { margin-left: auto; }

  /* Page shell + cards: tighter padding */
  .page { padding: 18px 14px 64px; }
  .card-pad { padding: 14px 14px; }
  .section-h { flex-wrap: wrap; gap: 8px; }

  /* Collapse fixed multi-column inline grids to a single column by default… */
  [style*="grid-template-columns"] { grid-template-columns: 1fr !important; }
  /* …but keep compact tile clusters in a tidy few-column layout */
  [style*="repeat(5"] { grid-template-columns: repeat(3, 1fr) !important; }
  [style*="repeat(4"] { grid-template-columns: repeat(2, 1fr) !important; }
  [style*="repeat(3"] { grid-template-columns: repeat(2, 1fr) !important; }
  [style*="repeat(auto-fill"] { grid-template-columns: 1fr !important; }
  /* …and keep dense pip/diamond tracks (e.g. Victories) as compact rows */
  [style*="repeat(15"] { grid-template-columns: repeat(15, 1fr) !important; }
  [style*="repeat(10"] { grid-template-columns: repeat(10, 1fr) !important; }

  /* Strips that intentionally run wider than the screen scroll sideways
     instead of being clipped by the body's overflow-x guard. */
  .scroll-x {
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
    flex-wrap: nowrap;
  }
  .scroll-x::-webkit-scrollbar { height: 0; }

  /* Sticky sidebars (sheet stacked layout) shouldn't pin on mobile */
  [style*="position: sticky"] { position: static !important; }

  /* Tame the largest display type so it never overflows the viewport */
  [style*="font-size:64px"], [style*="font-size: 64px"] { font-size: 40px !important; }
  [style*="font-size:48px"], [style*="font-size: 48px"] { font-size: 33px !important; }
  [style*="font-size:38px"], [style*="font-size: 38px"],
  [style*="font-size:36px"], [style*="font-size: 36px"] { font-size: 27px !important; }
  [style*="font-size:30px"], [style*="font-size: 30px"] { font-size: 24px !important; }
  .page h1 { font-size: 26px !important; }

  /* Media + form controls never overflow their container; long text wraps */
  img, video, input, textarea, select { max-width: 100%; }
  .page, .page p, .serif { overflow-wrap: break-word; }
}

</style>
</head>
<body>
<div id="root"></div>
<script>

<script type="text/babel" data-presets="react">
// Shared UI primitives for The Respite

const { useState, useEffect, useRef, useMemo, createContext, useContext, useCallback } = React;

// ----- App-wide context -----
const AppContext = createContext(null);
const useApp = () => useContext(AppContext);

// SheetContext — true when the current viewer owns the sheet (or is the Director)
const SheetContext = createContext(true);
const useCanEdit = () => useContext(SheetContext);

// ----- Avatar -----
function Avatar({ player, size = "md" }) {
  if (!player) return null;
  const cls = size === "lg" ? "avatar lg" : size === "xl" ? "avatar xl" : "avatar";
  return (
    <div className={`${cls} ${player.avatar}`} title={player.name}>
      {player.initials}
    </div>
  );
}

// ----- Editable text field (inline) -----
// Always renders as a textarea that auto-grows to fit its content, so even
// "single-line" fields wrap long text instead of scrolling sideways. For
// single-line fields, Enter commits (no newline); multiline keeps newlines.
function Editable({ value, onChange, multiline = false, placeholder = "", className = "", style = {} }) {
  const canEdit = useCanEdit();
  const [v, setV] = useState(value);
  const ref = useRef(null);
  useEffect(() => { setV(value); }, [value]);

  const autosize = () => {
    const el = ref.current;
    if (!el) return;
    el.style.height = "auto";
    el.style.height = el.scrollHeight + "px";
  };
  useEffect(() => { if (canEdit) autosize(); }, [v, canEdit]);

  if (!canEdit) {
    return (
      <span className={className} style={{ display: "inline-block", whiteSpace: "pre-wrap", overflowWrap: "anywhere", ...style }}>
        {value || <span className="dim italic">{placeholder}</span>}
      </span>
    );
  }

  const commit = () => { if (v !== value) onChange(v); };

  return (
    <textarea
      ref={ref}
      rows={1}
      className={`editable ${className}`}
      value={v}
      placeholder={placeholder}
      style={{ resize: "none", overflow: "hidden", whiteSpace: "pre-wrap", overflowWrap: "anywhere", boxSizing: "border-box", ...style }}
      onChange={(e) => { setV(e.target.value); }}
      onInput={autosize}
      onBlur={commit}
      onKeyDown={(e) => {
        if (!multiline && e.key === "Enter") { e.preventDefault(); e.target.blur(); }
        if (e.key === "Escape") { setV(value); e.target.blur(); }
      }}
    />
  );
}

// ----- Editable number with +/- pip control -----
function NumberStepper({ value, max, onChange, label, sub }) {
  return (
    <div className="stat-tile" style={{ minWidth: 88 }}>
      {label && <div className="label">{label}</div>}
      <div style={{ display: "flex", alignItems: "baseline", justifyContent: "center", gap: 6 }}>
        <button className="btn ghost sm" style={{ padding: "2px 7px", borderRadius: 4 }}
          onClick={() => onChange(Math.max(0, value - 1))}>−</button>
        <div className="value">{value}</div>
        <button className="btn ghost sm" style={{ padding: "2px 7px", borderRadius: 4 }}
          onClick={() => onChange(Math.min(max ?? 999, value + 1))}>+</button>
      </div>
      {sub && <div className="sub">{sub}</div>}
    </div>
  );
}

// ----- Signed stat tile editor (characteristics; allows negatives) -----
function StatStepper({ value, onChange, label, min = -10, max = 12, signed = true, bg = "var(--bg-0)" }) {
  const canEdit = useCanEdit();
  const display = signed ? (value >= 0 ? `+${value}` : `${value}`) : `${value}`;
  if (!canEdit) {
    return (
      <div className="stat-tile" style={{ background: bg }}>
        <div className="label">{label}</div>
        <div className="value" style={{ fontVariantNumeric: "tabular-nums" }}>{display}</div>
      </div>
    );
  }
  return (
    <div className="stat-tile" style={{ background: bg }}>
      <div className="label">{label}</div>
      <div style={{ display: "flex", alignItems: "center", justifyContent: "center", gap: 4 }}>
        <button className="btn ghost sm" style={{ padding: "0 6px", borderRadius: 4 }}
          onClick={() => onChange(Math.max(min, value - 1))}>−</button>
        <div className="value" style={{ fontVariantNumeric: "tabular-nums", minWidth: 26 }}>{display}</div>
        <button className="btn ghost sm" style={{ padding: "0 6px", borderRadius: 4 }}
          onClick={() => onChange(Math.min(max, value + 1))}>+</button>
      </div>
    </div>
  );
}

// ----- Inline editable pill (definitional fields: ancestry, class, etc.) -----
function EditPill({ tone, value, onChange, prefix = "", suffix = "", placeholder = "", number = false, width = 78 }) {
  const canEdit = useCanEdit();
  const [v, setV] = useState(value);
  useEffect(() => { setV(value); }, [value]);
  if (!canEdit) return <Pill tone={tone}>{prefix}{value}{suffix}</Pill>;
  const commit = () => {
    const out = number ? (parseInt(v, 10) || 0) : v;
    if (out !== value) onChange(out);
  };
  return (
    <span className="pill" style={{ display: "inline-flex", alignItems: "center", gap: 3, padding: "2px 8px" }}>
      {prefix && <span className="dim" style={{ fontSize: 11 }}>{prefix}</span>}
      <input
        value={v}
        placeholder={placeholder}
        size={number ? undefined : Math.max((v || "").length, (placeholder || "").length, 3)}
        onChange={e => setV(e.target.value)}
        onBlur={commit}
        onKeyDown={e => {
          if (e.key === "Enter") e.target.blur();
          if (e.key === "Escape") { setV(value); e.target.blur(); }
        }}
        style={{ width: number ? 30 : "auto", maxWidth: "100%", background: "transparent", border: "none", borderBottom: "1px dashed var(--line)", color: "inherit", font: "inherit", padding: "0 2px", textAlign: number ? "center" : "left" }}
      />
      {suffix && <span className="dim" style={{ fontSize: 11 }}>{suffix}</span>}
    </span>
  );
}

// ----- Tiny inline +/- control (max/current adjusters; editor-only) -----
function MaxControl({ value, onChange, label = "Max", min = 0, max = Infinity, style = {} }) {
  const canEdit = useCanEdit();
  if (!canEdit) return null;
  return (
    <div className="dim mono" style={{ fontSize: 10, display: "flex", alignItems: "center", gap: 4, ...style }}>
      <span style={{ letterSpacing: "0.04em" }}>{label}</span>
      <button className="btn ghost sm" style={{ padding: "0 5px", borderRadius: 3 }}
        onClick={() => onChange(Math.max(min, value - 1))}>−</button>
      <span style={{ color: "var(--ink-1)", minWidth: 14, textAlign: "center" }}>{value}</span>
      <button className="btn ghost sm" style={{ padding: "0 5px", borderRadius: 3 }}
        onClick={() => onChange(Math.min(max, value + 1))}>+</button>
    </div>
  );
}

// ----- Pip track (for resources, recoveries) -----
function PipTrack({ current, max, onChange, color = "ember" }) {
  const canEdit = useCanEdit();
  return (
    <div className="pip-track">
      {Array.from({ length: max }).map((_, i) => (
        <div
          key={i}
          className={`pip ${i < current ? "filled" : ""}`}
          onClick={canEdit ? () => onChange(i + 1 === current ? i : i + 1) : undefined}
          style={canEdit ? {} : { cursor: "default" }}
        />
      ))}
    </div>
  );
}

// ----- Stamina bar -----
function StaminaBar({ current, max, temp = 0, winded, dying = 0, onTempChange }) {
  const canEdit = useCanEdit();
  const windedAt = typeof winded === "number" ? winded : Math.floor(max / 2);
  const pct = Math.max(0, Math.min(100, (current / max) * 100));
  const tempPct = Math.max(0, Math.min(100, (temp / max) * 100));
  const windedPct = Math.max(0, Math.min(100, (windedAt / max) * 100));
  // dying is shown as a band below 0; visualize on the left edge as a tick
  const isDying = current <= dying;
  const isWinded = current <= windedAt && !isDying;

  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", gap: 8 }}>
        <span className="eyebrow">Stamina</span>
        <div style={{ display: "flex", alignItems: "baseline", gap: 8 }}>
          {isDying && <span className="mono" style={{ fontSize: 10, color: "var(--blood)", letterSpacing: "0.08em", textTransform: "uppercase", fontWeight: 700 }}>● Dying</span>}
          {isWinded && <span className="mono" style={{ fontSize: 10, color: "var(--gold-soft)", letterSpacing: "0.08em", textTransform: "uppercase", fontWeight: 700 }}>● Winded</span>}
          <span className="serif" style={{ fontSize: 18, fontWeight: 600, color: "var(--ink-0)" }}>
            {current}{temp > 0 && <span style={{ color: "var(--moss)", fontSize: 13 }}> +{temp}</span>} <span className="dim" style={{ fontSize: 13 }}>/ {max}</span>
          </span>
        </div>
      </div>
      <div className="bar" style={{ position: "relative", overflow: "visible" }}>
        <div className="fill" style={{ width: `${pct}%`, background: isDying ? "var(--blood)" : isWinded ? "linear-gradient(90deg, var(--gold-soft), var(--ember))" : undefined }}></div>
        {/* temp stamina overlay (striped) */}
        {temp > 0 && (
          <div style={{
            position: "absolute", top: 0, bottom: 0,
            left: `${pct}%`, width: `${tempPct}%`,
            background: "repeating-linear-gradient(45deg, oklch(0.55 0.10 140) 0 4px, oklch(0.45 0.08 140) 4px 8px)",
            borderRight: "1px solid var(--moss)",
          }}/>
        )}
        {/* winded threshold tick */}
        <div style={{
          position: "absolute", top: -2, bottom: -2, left: `${windedPct}%`, width: 1,
          background: "var(--gold-soft)", boxShadow: "0 0 4px var(--gold)",
        }} title={`Winded at ${windedAt}`}/>
      </div>
      <div className="dim mono" style={{ fontSize: 10, display: "flex", justifyContent: "space-between" }}>
        <span>Dying ≤ {dying}</span>
        <span style={{ color: "var(--gold-soft)" }}>Winded ≤ {windedAt}</span>
        {(onTempChange && canEdit) ? (
          <span style={{ display: "flex", alignItems: "center", gap: 4, color: "var(--moss)" }}>
            <button onClick={() => onTempChange(Math.max(0, temp - 1))} style={{ background: "none", border: "none", color: "var(--moss)", cursor: "pointer", padding: "0 4px", fontSize: 11 }}>−</button>
            Temp {temp}
            <button onClick={() => onTempChange(temp + 1)} style={{ background: "none", border: "none", color: "var(--moss)", cursor: "pointer", padding: "0 4px", fontSize: 11 }}>+</button>
          </span>
        ) : (
          <span style={{ color: "var(--moss)" }}>Temp +{temp}</span>
        )}
      </div>
    </div>
  );
}

// ----- Section header -----
function SectionH({ eyebrow, title, action }) {
  return (
    <div className="section-h">
      <div>
        {eyebrow && <span className="eyebrow">{eyebrow}</span>}
        <h2>{title}</h2>
      </div>
      {action}
    </div>
  );
}

// ----- Card -----
function Card({ children, rail = false, pad = true, style = {}, className = "" }) {
  return (
    <div className={`card ${rail ? "with-rail" : ""} ${className}`} style={style}>
      {pad ? <div className="card-pad">{children}</div> : children}
    </div>
  );
}

// ----- Striped placeholder -----
function Placeholder({ label, ratio = "16 / 9", style = {}, className = "" }) {
  return (
    <div className={`placeholder ${className}`} style={{ aspectRatio: ratio, width: "100%", ...style }}>
      {label}
    </div>
  );
}

// ----- Portrait placeholder (with tinted overlay) -----
function PortraitPlaceholder({ tint = "moss", label, ratio = "3 / 4", style = {} }) {
  const tintMap = {
    moss: "oklch(0.55 0.07 140 / 0.18)",
    arcane: "oklch(0.60 0.10 280 / 0.18)",
    gold: "oklch(0.80 0.11 85 / 0.16)",
    blood: "oklch(0.50 0.14 25 / 0.18)",
    ember: "oklch(0.70 0.17 45 / 0.16)",
  };
  return (
    <div
      className="placeholder"
      style={{
        aspectRatio: ratio,
        width: "100%",
        position: "relative",
        background: `
          linear-gradient(180deg, ${tintMap[tint] || tintMap.moss}, transparent 60%),
          repeating-linear-gradient(135deg, var(--bg-2) 0, var(--bg-2) 6px, var(--bg-1) 6px, var(--bg-1) 12px)
        `,
        ...style,
      }}
    >
      <div style={{ textAlign: "center", padding: 12, lineHeight: 1.4 }}>{label}</div>
    </div>
  );
}

// ----- Character portrait (uploadable image, falls back to placeholder) -----
function Portrait({ c, set, ratio = "3 / 4" }) {
  const canEdit = useCanEdit();
  const app = useApp();
  const fileRef = useRef(null);
  const [busy, setBusy] = useState(false);

  const pick = () => fileRef.current && fileRef.current.click();
  const onFile = async (e) => {
    const file = e.target.files && e.target.files[0];
    e.target.value = "";
    if (!file) return;
    setBusy(true);
    const url = await app.uploadPortrait(file);
    setBusy(false);
    if (url) set("portraitUrl", url);
  };

  return (
    <div style={{ position: "relative" }}>
      {c.portraitUrl ? (
        <div style={{ width: "100%", aspectRatio: ratio, borderRadius: 6, overflow: "hidden", border: "1px solid var(--line)" }}>
          <img src={c.portraitUrl} alt={c.name}
            style={{ width: "100%", height: "100%", objectFit: "cover", display: "block" }}/>
        </div>
      ) : (
        <PortraitPlaceholder tint={c.portraitTint} label={c.portrait || (canEdit ? "No portrait yet" : c.name)} ratio={ratio}/>
      )}
      {canEdit && (
        <>
          <input ref={fileRef} type="file" accept="image/*" onChange={onFile} style={{ display: "none" }}/>
          <button className="btn ghost sm" onClick={pick} disabled={busy}
            style={{ position: "absolute", bottom: 8, right: 8, fontSize: 11, padding: "4px 10px",
              background: "var(--bg-0)", borderRadius: 4, opacity: busy ? 0.6 : 0.95 }}>
            {busy ? "Uploading…" : (c.portraitUrl ? "Change" : "Upload portrait")}
          </button>
          {c.portraitUrl && !busy && (
            <button className="btn ghost sm" onClick={() => set("portraitUrl", "")}
              title="Remove portrait"
              style={{ position: "absolute", top: 8, right: 8, fontSize: 13, padding: "0 8px",
                background: "var(--bg-0)", borderRadius: 4, color: "var(--blood)" }}>×</button>
          )}
        </>
      )}
    </div>
  );
}

// ----- Pill -----
function Pill({ children, tone = "" }) {
  return <span className={`pill ${tone}`}>{children}</span>;
}

// ----- Format date helpers -----
function fmtDate(iso, opts = {}) {
  const d = new Date(iso);
  return d.toLocaleDateString(undefined, { weekday: "short", month: "short", day: "numeric", ...opts });
}
function fmtTime(iso) {
  const d = new Date(iso);
  return d.toLocaleTimeString(undefined, { hour: "numeric", minute: "2-digit" });
}
function fmtRelative(iso) {
  const d = new Date(iso);
  const now = new Date();
  const diff = (d - now) / 1000;
  const abs = Math.abs(diff);
  if (abs < 60) return "just now";
  if (abs < 3600) return `${Math.round(abs / 60)}m ${diff < 0 ? "ago" : ""}`;
  if (abs < 86400) return `${Math.round(abs / 3600)}h ${diff < 0 ? "ago" : ""}`;
  if (abs < 86400 * 7) return `${Math.round(abs / 86400)}d ${diff < 0 ? "ago" : ""}`;
  return fmtDate(iso);
}

// ----- Countdown -----
function useCountdown(targetIso) {
  const [now, setNow] = useState(() => Date.now());
  useEffect(() => {
    const id = setInterval(() => setNow(Date.now()), 1000);
    return () => clearInterval(id);
  }, []);
  const target = new Date(targetIso).getTime();
  const diff = Math.max(0, target - now);
  const days = Math.floor(diff / 86400000);
  const hours = Math.floor((diff % 86400000) / 3600000);
  const mins = Math.floor((diff % 3600000) / 60000);
  const secs = Math.floor((diff % 60000) / 1000);
  return { days, hours, mins, secs, done: diff === 0 };
}

Object.assign(window, {
  AppContext, useApp, SheetContext, useCanEdit,
  Avatar, Editable, NumberStepper, PipTrack, StaminaBar,
  SectionH, Card, Placeholder, PortraitPlaceholder, Pill,
  fmtDate, fmtTime, fmtRelative, useCountdown,
});

</script>

// ── useTweaks ───────────────────────────────────────────────────────────────
// Single source of truth for tweak values. setTweak persists via the host
// (__edit_mode_set_keys → host rewrites the EDITMODE block on disk).
function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  // Accepts either setTweak('key', value) or setTweak({ key: value, ... }) so a
  // useState-style call doesn't write a "[object Object]" key into the persisted
  // JSON block.
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
  }, []);
  return [values, setTweak];
}

// ── TweaksPanel ─────────────────────────────────────────────────────────────
// Floating shell. Registers the protocol listener BEFORE announcing
// availability — if the announce ran first, the host's activate could land
// before our handler exists and the toolbar toggle would silently no-op.
// The close button posts __edit_mode_dismissed so the host's toolbar toggle
// flips off in lockstep; the host echoes __deactivate_edit_mode back which
// is what actually hides the panel.
function TweaksPanel({ title = 'Tweaks', children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;

  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);

  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    if (typeof ResizeObserver === 'undefined') {
      window.addEventListener('resize', clampToViewport);
      return () => window.removeEventListener('resize', clampToViewport);
    }
    const ro = new ResizeObserver(clampToViewport);
    ro.observe(document.documentElement);
    return () => ro.disconnect();
  }, [open, clampToViewport]);

  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const dismiss = () => {
    setOpen(false);
    window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
  };

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = {
        x: startRight - (ev.clientX - sx),
        y: startBottom - (ev.clientY - sy),
      };
      clampToViewport();
    };
    const up = () => {
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
    };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel" data-noncommentable=""
           style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" aria-label="Close tweaks"
                  onMouseDown={(e) => e.stopPropagation()}
                  onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">{children}</div>
      </div>
    </>
  );
}

// ── Layout helpers ──────────────────────────────────────────────────────────

function TweakSection({ label, children }) {
  return (
    <>
      <div className="twk-sect">{label}</div>
      {children}
    </>
  );
}

function TweakRow({ label, value, children, inline = false }) {
  return (
    <div className={inline ? 'twk-row twk-row-h' : 'twk-row'}>
      <div className="twk-lbl">
        <span>{label}</span>
        {value != null && <span className="twk-val">{value}</span>}
      </div>
      {children}
    </div>
  );
}

// ── Controls ────────────────────────────────────────────────────────────────

function TweakSlider({ label, value, min = 0, max = 100, step = 1, unit = '', onChange }) {
  return (
    <TweakRow label={label} value={`${value}${unit}`}>
      <input type="range" className="twk-slider" min={min} max={max} step={step}
             value={value} onChange={(e) => onChange(Number(e.target.value))} />
    </TweakRow>
  );
}

function TweakToggle({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <button type="button" className="twk-toggle" data-on={value ? '1' : '0'}
              role="switch" aria-checked={!!value}
              onClick={() => onChange(!value)}><i /></button>
    </div>
  );
}

function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;

  // The active value is read by pointer-move handlers attached for the lifetime
  // of a drag — ref it so a stale closure doesn't fire onChange for every move.
  const valueRef = React.useRef(value);
  valueRef.current = value;

  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const inner = r.width - 4;
    const i = Math.floor(((clientX - r.left - 2) / inner) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };

  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => {
      if (!trackRef.current) return;
      const v = segAt(ev.clientX);
      if (v !== valueRef.current) onChange(v);
    };
    const up = () => {
      setDragging(false);
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };

  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown}
           className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb"
             style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`,
                      width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => (
          <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>
            {o.label}
          </button>
        ))}
      </div>
    </TweakRow>
  );
}

function TweakSelect({ label, value, options, onChange }) {
  return (
    <TweakRow label={label}>
      <select className="twk-field" value={value} onChange={(e) => onChange(e.target.value)}>
        {options.map((o) => {
          const v = typeof o === 'object' ? o.value : o;
          const l = typeof o === 'object' ? o.label : o;
          return <option key={v} value={v}>{l}</option>;
        })}
      </select>
    </TweakRow>
  );
}

function TweakText({ label, value, placeholder, onChange }) {
  return (
    <TweakRow label={label}>
      <input className="twk-field" type="text" value={value} placeholder={placeholder}
             onChange={(e) => onChange(e.target.value)} />
    </TweakRow>
  );
}

function TweakNumber({ label, value, min, max, step = 1, unit = '', onChange }) {
  const clamp = (n) => {
    if (min != null && n < min) return min;
    if (max != null && n > max) return max;
    return n;
  };
  const startRef = React.useRef({ x: 0, val: 0 });
  const onScrubStart = (e) => {
    e.preventDefault();
    startRef.current = { x: e.clientX, val: value };
    const decimals = (String(step).split('.')[1] || '').length;
    const move = (ev) => {
      const dx = ev.clientX - startRef.current.x;
      const raw = startRef.current.val + dx * step;
      const snapped = Math.round(raw / step) * step;
      onChange(clamp(Number(snapped.toFixed(decimals))));
    };
    const up = () => {
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };
  return (
    <div className="twk-num">
      <span className="twk-num-lbl" onPointerDown={onScrubStart}>{label}</span>
      <input type="number" value={value} min={min} max={max} step={step}
             onChange={(e) => onChange(clamp(Number(e.target.value)))} />
      {unit && <span className="twk-num-unit">{unit}</span>}
    </div>
  );
}

function TweakColor({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <input type="color" className="twk-swatch" value={value}
             onChange={(e) => onChange(e.target.value)} />
    </div>
  );
}

function TweakButton({ label, onClick, secondary = false }) {
  return (
    <button type="button" className={secondary ? 'twk-btn secondary' : 'twk-btn'}
            onClick={onClick}>{label}</button>
  );
}

Object.assign(window, {
  useTweaks, TweaksPanel, TweakSection, TweakRow,
  TweakSlider, TweakToggle, TweakRadio, TweakSelect,
  TweakText, TweakNumber, TweakColor, TweakButton,
});

</script>

      </div>

      {/* Recent notes + last session */}
      <div style={{ display: "grid", gridTemplateColumns: "1.4fr 1fr", gap: 24 }}>
        <Card>
          <SectionH eyebrow="Memoria" title="From the table" action={
            <button className="btn ghost sm" onClick={() => setTab("notes")}>All notes →</button>
          } />
          <div style={{ display: "flex", flexDirection: "column", gap: 14 }}>
            {recentNotes.map(n => {
              const author = players.find(p => p.id === n.authorId);
              return (
                <div key={n.id} style={{ display: "grid", gridTemplateColumns: "auto 1fr", gap: 12 }}>
                  <Avatar player={author} />
                  <div>
                    <div style={{ display: "flex", gap: 8, alignItems: "baseline", marginBottom: 4 }}>
                      <span className="serif" style={{ color: "var(--ink-0)", fontWeight: 600 }}>{author?.name}</span>
                      <span className="dim" style={{ fontSize: 11 }}>· {fmtRelative(n.posted)}</span>
                    </div>
                    <div style={{ fontSize: 13, color: "var(--ink-1)", lineHeight: 1.55 }}>{n.body}</div>
                  </div>
                </div>
              );
            })}
          </div>
        </Card>

        {lastSession ? (
        <Card>
          <SectionH eyebrow="Last session" title={`#${lastSession.number} — ${lastSession.title}`} action={null}/>
          <div className="serif italic" style={{ color: "var(--ink-1)", fontSize: 15, lineHeight: 1.55, marginBottom: 16 }}>
            "{lastSession.recap}"
          </div>
          <div className="dim" style={{ fontSize: 11, letterSpacing: "0.05em", textTransform: "uppercase", marginBottom: 8 }}>Attendance</div>
          <div style={{ display: "flex", gap: 6 }}>
            {players.map(p => {
              const r = lastSession.rsvps[p.id];
              return (
                <div key={p.id} style={{ position: "relative", opacity: r === "yes" ? 1 : 0.35 }}>
                  <Avatar player={p}/>
                </div>
              );
            })}
          </div>
        </Card>
        ) : (
        <Card>
          <SectionH eyebrow="The Chronicle" title="No sessions yet" action={null}/>
          <div className="serif italic" style={{ color: "var(--ink-2)", fontSize: 15 }}>Once a session is logged, the last one shows here.</div>
        </Card>
        )}
      </div>
    </div>
  );
}

window.Hub = Hub;

</script>

<script type="text/babel" data-presets="react">
// Events tab — upcoming, past, attendance

function EventsTab() {
  const app = useApp();
  const { sessions, players, setRsvp, meId, addSession, deleteSession } = app;
  const upcoming = sessions.filter(s => s.upcoming).sort((a,b) => new Date(a.date) - new Date(b.date));
  const past = sessions.filter(s => s.past).sort((a,b) => new Date(b.date) - new Date(a.date));
  const next = upcoming[0];
  const cd = useCountdown(next?.date);
  const [showForm, setShowForm] = useState(false);

  return (
    <div className="page">
      {/* Hero countdown */}
      {next && (
      <Card pad={false} style={{ marginBottom: 32, padding: "32px 36px", background: "linear-gradient(135deg, var(--bg-1) 0%, var(--bg-2) 100%)" }} rail>
        <div style={{ padding: "32px 36px", display: "grid", gridTemplateColumns: "1fr auto", gap: 32, alignItems: "center" }}>
          <div>
            <div className="eyebrow" style={{ marginBottom: 6 }}>The next gathering</div>
            <h1 className="serif" style={{ fontSize: 36, margin: "0 0 8px", color: "var(--ink-0)", letterSpacing: "0.005em" }}>{next.title}</h1>
            <div className="muted serif italic" style={{ fontSize: 16, marginBottom: 16 }}>"{next.summary}"</div>
            <div style={{ display: "flex", gap: 16, flexWrap: "wrap", alignItems: "center" }}>
              <Pill tone="ember">{fmtDate(next.date, { weekday: "long" })}</Pill>
              <Pill>{fmtTime(next.date)}</Pill>
              <Pill tone={next.mode === "in-person" ? "moss" : next.mode === "remote" ? "gold" : ""}>{next.mode}</Pill>
              <span className="dim" style={{ fontSize: 13 }}>· {next.location}</span>
            </div>
          </div>
          <div style={{ textAlign: "right" }}>
            <div className="eyebrow" style={{ marginBottom: 8 }}>Until then</div>
            <div className="serif" style={{ fontSize: 64, fontWeight: 600, color: "var(--ember)", lineHeight: 1, fontVariantNumeric: "tabular-nums", textShadow: "0 0 24px oklch(0.70 0.17 45 / 0.4)" }}>
              {cd.days}<span className="dim" style={{ fontSize: 22 }}>d</span> {String(cd.hours).padStart(2,"0")}<span className="dim" style={{ fontSize: 22 }}>h</span>
            </div>
            <div className="dim mono" style={{ fontSize: 11, marginTop: 6 }}>
              {String(cd.mins).padStart(2, "0")}m {String(cd.secs).padStart(2, "0")}s
            </div>
          </div>
        </div>
      </Card>
      )}

      {/* Upcoming */}
      <SectionH eyebrow="Upcoming" title="On the road ahead" action={
        <button className="btn ghost sm" onClick={() => setShowForm(v => !v)}>{showForm ? "Cancel" : "+ Schedule"}</button>
      }/>
      {showForm && <ScheduleForm onCreate={async (form) => { await addSession(form); setShowForm(false); }}/>}
      {upcoming.length === 0 && !showForm && (
        <div className="muted italic serif" style={{ fontSize: 14, padding: "20px 0", textAlign: "center", marginBottom: 24 }}>
          No sessions scheduled yet — hit <strong>+ Schedule</strong> to plan the next gathering.
        </div>
      )}
      <div style={{ display: "flex", flexDirection: "column", gap: 14, marginBottom: 36 }}>
        {upcoming.map(s => <UpcomingRow key={s.id} session={s} players={players} setRsvp={setRsvp} meId={meId} onDelete={deleteSession}/>)}
      </div>

      {/* Past */}
      <SectionH eyebrow="The Chronicle" title="Sessions logged" action={
        <span className="dim mono" style={{ fontSize: 11 }}>{past.length} sessions · {past.reduce((a,s) => a + Object.values(s.rsvps).filter(v => v === "yes").length, 0)} attendances</span>
      }/>
      <div style={{ display: "flex", flexDirection: "column", gap: 0, borderTop: "1px solid var(--line)" }}>
        {past.map(s => <PastRow key={s.id} session={s} players={players}/>)}
      </div>
    </div>
  );
}

function ScheduleForm({ onCreate }) {
  const [title, setTitle] = useState("");
  const [date, setDate] = useState("");
  const [mode, setMode] = useState("in-person");
  const [location, setLocation] = useState("");
  const [summary, setSummary] = useState("");
  const [busy, setBusy] = useState(false);
  const valid = title.trim() && date;

  const submit = async () => {
    if (!valid || busy) return;
    setBusy(true);
    // datetime-local has no timezone; convert to ISO so countdowns work
    await onCreate({ title: title.trim(), date: new Date(date).toISOString(), mode, location: location.trim(), summary: summary.trim() });
    setBusy(false);
  };

  const field = { background: "var(--bg-0)", border: "1px solid var(--line)", borderRadius: 6, padding: "9px 12px", color: "var(--ink-0)", font: "inherit", fontSize: 14, width: "100%" };
  const lbl = { display: "block", marginBottom: 4 };

  return (
    <Card style={{ marginBottom: 24 }} rail>
      <div className="eyebrow" style={{ marginBottom: 14 }}>Schedule a session</div>
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 14 }}>
        <div style={{ gridColumn: "1 / -1" }}>
          <span className="eyebrow" style={lbl}>Title</span>
          <input style={field} value={title} onChange={e => setTitle(e.target.value)} placeholder="e.g. The Sunken Vault"/>
        </div>
        <div>
          <span className="eyebrow" style={lbl}>Date & time</span>
          <input style={field} type="datetime-local" value={date} onChange={e => setDate(e.target.value)}/>
        </div>
        <div>
          <span className="eyebrow" style={lbl}>Mode</span>
          <select style={field} value={mode} onChange={e => setMode(e.target.value)}>
            <option value="in-person">in-person</option>
            <option value="remote">remote</option>
            <option value="hybrid">hybrid</option>
          </select>
        </div>
        <div style={{ gridColumn: "1 / -1" }}>
          <span className="eyebrow" style={lbl}>Location</span>
          <input style={field} value={location} onChange={e => setLocation(e.target.value)} placeholder="Where (or which platform)"/>
        </div>
        <div style={{ gridColumn: "1 / -1" }}>
          <span className="eyebrow" style={lbl}>Summary / teaser</span>
          <textarea style={{ ...field, minHeight: 70, resize: "vertical" }} value={summary} onChange={e => setSummary(e.target.value)} placeholder="A short hook for the session…"/>
        </div>
      </div>
      <div style={{ display: "flex", justifyContent: "flex-end", gap: 10, marginTop: 16 }}>
        <button className={`btn ${valid ? "ember" : "ghost"}`} onClick={submit} disabled={!valid || busy}
          style={{ opacity: !valid || busy ? 0.6 : 1 }}>
          {busy ? "Scheduling…" : "Add to schedule"}
        </button>
      </div>
    </Card>
  );
}

function UpcomingRow({ session, players, setRsvp, meId, onDelete }) {
  const cd = useCountdown(session.date);
  const myRsvp = session.rsvps[meId];
  const yes = Object.entries(session.rsvps).filter(([_, v]) => v === "yes").map(([k]) => k);
  const maybe = Object.entries(session.rsvps).filter(([_, v]) => v === "maybe").map(([k]) => k);
  const no = Object.entries(session.rsvps).filter(([_, v]) => v === "no").map(([k]) => k);

  return (
    <Card rail>
      <div style={{ display: "grid", gridTemplateColumns: "120px 1fr auto", gap: 24, alignItems: "center" }}>
        {/* Date block */}
        <div style={{ textAlign: "center", borderRight: "1px solid var(--line)", paddingRight: 24 }}>
          <div className="display" style={{ color: "var(--ember)", fontSize: 14, marginBottom: 2, textTransform: "uppercase", letterSpacing: "0.06em" }}>
            {new Date(session.date).toLocaleDateString(undefined, { month: "short" })}
          </div>
          <div className="serif" style={{ fontSize: 38, color: "var(--ink-0)", lineHeight: 1, fontWeight: 600 }}>
            {new Date(session.date).getDate()}
          </div>
          <div className="dim" style={{ fontSize: 11, marginTop: 4, letterSpacing: "0.04em", textTransform: "uppercase" }}>
            {new Date(session.date).toLocaleDateString(undefined, { weekday: "short" })} · {fmtTime(session.date)}
          </div>
        </div>

        {/* Body */}
        <div>
          <div style={{ display: "flex", gap: 10, alignItems: "baseline", marginBottom: 6 }}>
            <span className="dim mono" style={{ fontSize: 11 }}>SESSION {String(session.number).padStart(2, "0")}</span>
            <Pill tone={session.mode === "in-person" ? "moss" : session.mode === "remote" ? "gold" : ""}>{session.mode}</Pill>
            <span className="dim" style={{ fontSize: 12 }}>· {cd.days}d {cd.hours}h away</span>
            {onDelete && (
              <button className="btn ghost sm" title="Remove session"
                onClick={() => { if (confirm(`Remove "${session.title}" from the schedule?`)) onDelete(session.id); }}
                style={{ padding: "0 7px", borderRadius: 4, color: "var(--blood)", fontSize: 13, marginLeft: "auto" }}>×</button>
            )}
          </div>
          <div className="serif" style={{ fontSize: 22, color: "var(--ink-0)", fontWeight: 600, marginBottom: 6 }}>{session.title}</div>
          <div className="muted serif italic" style={{ fontSize: 14, marginBottom: 8, maxWidth: 640 }}>"{session.summary}"</div>
          <div className="dim" style={{ fontSize: 12 }}>📍 {session.location}</div>
        </div>

        {/* RSVP */}
        <div style={{ minWidth: 200 }}>
          <div className="dim" style={{ fontSize: 11, letterSpacing: "0.05em", textTransform: "uppercase", marginBottom: 6, textAlign: "right" }}>Your RSVP</div>
          <div style={{ display: "flex", gap: 4, marginBottom: 12, justifyContent: "flex-end" }}>
            {[
              { v: "yes", label: "Yes" },
              { v: "maybe", label: "Maybe" },
              { v: "no", label: "No" },
            ].map(o => (
              <button key={o.v}
                className={`btn sm ${myRsvp === o.v ? "ember" : "ghost"}`}
                onClick={() => setRsvp(session.id, meId, o.v)}>
                {o.label}
              </button>
            ))}
          </div>
          <div style={{ display: "flex", gap: 8, justifyContent: "flex-end", flexWrap: "wrap" }}>
            <AttendanceCluster players={players} ids={yes} tone="moss" label={`${yes.length} in`}/>
            {maybe.length > 0 && <AttendanceCluster players={players} ids={maybe} tone="gold" label={`${maybe.length} maybe`}/>}
            {no.length > 0 && <AttendanceCluster players={players} ids={no} tone="blood" label={`${no.length} out`} dim/>}
          </div>
        </div>
      </div>
    </Card>
  );
}

function AttendanceCluster({ players, ids, tone, label, dim = false }) {
  return (
    <div style={{ display: "inline-flex", alignItems: "center", gap: 6, opacity: dim ? 0.6 : 1 }} title={label}>
      <div style={{ display: "flex" }}>
        {ids.map((id, i) => {
          const p = players.find(pp => pp.id === id);
          if (!p) return null;
          return (
            <div key={id} style={{ marginLeft: i === 0 ? 0 : -8, border: "2px solid var(--bg-1)", borderRadius: "50%" }}>
              <Avatar player={p}/>
            </div>
          );
        })}
      </div>
    </div>
  );
}

function PastRow({ session, players }) {
  const [open, setOpen] = useState(false);
  const yes = Object.entries(session.rsvps).filter(([_, v]) => v === "yes").map(([k]) => k);

  return (
    <div style={{ borderBottom: "1px solid var(--line)" }}>
      <button
        onClick={() => setOpen(!open)}
        style={{
          display: "grid", gridTemplateColumns: "60px 1fr auto auto", gap: 20, alignItems: "center",
          width: "100%", textAlign: "left", padding: "16px 4px", background: "transparent", border: 0,
        }}
      >
        <div className="dim mono" style={{ fontSize: 11 }}>S{String(session.number).padStart(2, "0")}</div>
        <div>
          <div className="serif" style={{ fontSize: 16, color: "var(--ink-0)", fontWeight: 600 }}>{session.title}</div>
          <div className="dim" style={{ fontSize: 12, marginTop: 2 }}>{fmtDate(session.date)} · {session.location}</div>
        </div>
        <div style={{ display: "flex" }}>
          {players.map((p, i) => {
            const present = yes.includes(p.id);
            return (
              <div key={p.id} style={{
                marginLeft: i === 0 ? 0 : -6,
                opacity: present ? 1 : 0.25,
                filter: present ? "none" : "grayscale(0.8)",
              }}>
                <Avatar player={p}/>
              </div>
            );
          })}
        </div>
        <div className="dim" style={{ fontSize: 18, transform: open ? "rotate(90deg)" : "none", transition: "transform 0.2s" }}>›</div>
      </button>
      {open && (
        <div style={{ padding: "0 4px 20px 84px" }}>
          <div className="muted serif italic" style={{ fontSize: 14, lineHeight: 1.6, marginBottom: 8 }}>"{session.summary}"</div>
          {session.recap && (
            <div style={{
              padding: "12px 16px", borderLeft: "2px solid var(--ember)",
              background: "var(--bg-1)", borderRadius: "0 6px 6px 0",
              fontSize: 13, color: "var(--ink-1)", lineHeight: 1.6,
            }}>
              <div className="eyebrow" style={{ marginBottom: 4 }}>Recap</div>
              {session.recap}
            </div>
          )}
        </div>
      )}
    </div>
  );
}

window.EventsTab = EventsTab;

</script>

<script type="text/babel" data-presets="react">
// Character sheet tab — profile switcher + sheet, inline edit, layout variants

function CharactersTab() {
  const app = useApp();
  const { players, characters, selectedPlayer, setSelectedPlayer, updateCharacter, sheetLayout } = app;
  const playerList = players.filter(p => p.role === "Player");
  const player = playerList.find(p => p.id === selectedPlayer) || playerList[0];
  const c = player ? characters[player.id] : null;

  if (!player || !c) {
    return (
      <div className="page">
        <div className="card" style={{ padding: 40, textAlign: "center", background: "var(--bg-1)", maxWidth: 520, margin: "40px auto" }}>
          <div className="display" style={{ fontSize: 30, color: "var(--ember)", marginBottom: 10 }}>No characters yet</div>
          <div className="serif italic" style={{ color: "var(--ink-2)", fontSize: 15, marginBottom: 6 }}>
            The party table is empty.
          </div>
          <div className="dim" style={{ fontSize: 13 }}>
            Players create their own adventurer when they first sign in. Once someone joins, their sheet appears here.
          </div>
        </div>
      </div>
    );
  }

  return (
    <div className="page">
      {/* Player switcher */}
      <div style={{ display: "flex", gap: 8, marginBottom: 24, alignItems: "center", overflowX: "auto", paddingBottom: 4 }}>
        <span className="eyebrow" style={{ marginRight: 8, flexShrink: 0 }}>Profiles</span>
        {playerList.map(p => {
          const active = p.id === player.id;
          const ch = characters[p.id];
          return (
            <button key={p.id}
              onClick={() => setSelectedPlayer(p.id)}
              className="card"
              style={{
                display: "flex", gap: 10, alignItems: "center", padding: "8px 14px 8px 8px",
                background: active ? "var(--bg-2)" : "var(--bg-1)",
                border: active ? "1px solid var(--ember)" : "1px solid var(--line)",
                cursor: "pointer", flexShrink: 0,
                boxShadow: active ? "0 0 0 1px oklch(0.70 0.17 45 / 0.3), var(--shadow-glow)" : "none",
                transition: "all 0.15s",
              }}
            >
              <Avatar player={p}/>
              <div style={{ textAlign: "left" }}>
                <div className="serif" style={{ fontSize: 14, color: active ? "var(--ink-0)" : "var(--ink-1)", fontWeight: 600, lineHeight: 1.1 }}>{ch?.name || p.name}</div>
                <div className="dim" style={{ fontSize: 11 }}>{p.name} · {ch ? `${ch.cls} ${ch.level}` : "—"}</div>
              </div>
            </button>
          );
        })}
      </div>

      {(() => {
        // The account that created the sheet (its ownerId / claimed slot) can edit,
        // and the Director can edit everyone's.
        const canEdit = app.meId === player.id || app.meId === c?.ownerId || app.meId === "gm";
        return (
          <SheetContext.Provider value={canEdit}>
            {!canEdit && (
              <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 14, padding: "8px 14px", background: "oklch(0.30 0.05 280 / 0.15)", border: "1px solid oklch(0.40 0.06 280)", borderRadius: 6 }}>
                <span style={{ color: "oklch(0.78 0.05 280)", fontSize: 13 }}>👁 Viewing {c.name}'s sheet — only <strong>{window.PLAYERS.find(p => p.id === player.id)?.name}</strong> can edit this.</span>
              </div>
            )}
            {sheetLayout === "stacked"
              ? <SheetStacked character={c} updateCharacter={updateCharacter} player={player}/>
              : <SheetSpread character={c} updateCharacter={updateCharacter} player={player}/>}
          </SheetContext.Provider>
        );
      })()}
    </div>
  );
}

// Layout A: spread (portrait left + stats right + content tabs below)
function SheetSpread({ character: c, updateCharacter, player }) {
  const set = (path, value) => updateCharacter(player.id, path, value);
  const [section, setSection] = useState("abilities");
  const sections = [
    { id: "abilities", label: "Abilities" },
    { id: "features", label: "Features & Kit" },
    { id: "skills", label: "Skills, Perks, & Traits" },
    { id: "titles", label: "Titles" },
    { id: "origin", label: "Culture & Career" },
    { id: "projects", label: "Downtime" },
    { id: "inventory", label: "Inventory" },
    { id: "ties", label: "Ties & Backstory" },
    { id: "conditions", label: "Conditions & Notes" },
    { id: "dice", label: "Dice" },
  ];

  return (
    <>
      {/* Header card */}
      <Card pad={false} rail style={{ marginBottom: 20 }}>
        <div style={{ display: "grid", gridTemplateColumns: "240px 1fr", gap: 0 }}>
          <div style={{ padding: 18, borderRight: "1px solid var(--line)" }}>
            <Portrait c={c} set={set} ratio="3 / 4"/>
          </div>
          <div style={{ padding: "22px 26px" }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", gap: 16, marginBottom: 8 }}>
              <div>
                <div className="eyebrow" style={{ marginBottom: 4 }}>
                  <Editable value={c.titles[0] || ""} onChange={v => set("titles", [v])} placeholder="Title / epithet"/>
                </div>
                <h1 className="serif" style={{ fontSize: 36, margin: 0, color: "var(--ink-0)", letterSpacing: "0.005em", lineHeight: 1 }}>
                  <Editable value={c.name} onChange={v => set("name", v)}/>
                </h1>
                <div className="muted serif italic" style={{ fontSize: 14, marginTop: 6 }}>
                  <Editable value={c.pronouns} onChange={v => set("pronouns", v)} placeholder="pronouns"/> · played by {player.name}
                </div>
              </div>
              <div style={{ display: "flex", gap: 8, flexWrap: "wrap", justifyContent: "flex-end" }}>
                <EditPill tone="ember" prefix="Level " value={c.level} onChange={v => set("level", v)} number/>
                <EditPill tone="race" value={c.ancestry} onChange={v => set("ancestry", v)} placeholder="Ancestry"/>
                <EditPill value={c.cls} onChange={v => set("cls", v)} placeholder="Class"/>
                <EditPill tone="gold" value={c.career} onChange={v => set("career", v)} placeholder="Career"/>
                <EditPill tone="gold" suffix=" kit" value={c.kit} onChange={v => set("kit", v)} placeholder="Kit"/>
              </div>
            </div>

            <div className="rule"></div>

            {/* Characteristics */}
            <div style={{ display: "grid", gridTemplateColumns: "repeat(5, 1fr)", gap: 10, marginBottom: 18 }}>
              {Object.entries(c.characteristics).map(([k, v]) => (
                <StatStepper key={k} label={k} value={v}
                  onChange={nv => set("characteristics", { ...c.characteristics, [k]: nv })}/>
              ))}
            </div>

            {/* Stamina + recoveries + resource + surges */}
            <div style={{ display: "grid", gridTemplateColumns: "1.5fr 1fr 1fr 1fr", gap: 12 }}>
              <div className="card" style={{ padding: "12px 14px", background: "var(--bg-0)" }}>
                <StaminaBar
                  current={c.stamina.current} max={c.stamina.max}
                  temp={c.tempStamina ?? 0}
                  winded={Math.floor(c.stamina.max / 2)}
                  dying={-Math.floor(c.stamina.max / 2)}
                  onTempChange={v => set("tempStamina", v)}
                />
                <div style={{ display: "flex", gap: 14, marginTop: 6 }}>
                  <MaxControl label="Cur" value={c.stamina.current} min={-999}
                    onChange={v => set("stamina", { ...c.stamina, current: v })}/>
                  <MaxControl label="Max" value={c.stamina.max} min={1}
                    onChange={v => set("stamina", { ...c.stamina, max: v })}/>
                </div>
              </div>
              <div className="card" style={{ padding: "10px 14px", background: "var(--bg-0)" }}>
                <div className="eyebrow" style={{ marginBottom: 6 }}>Recoveries</div>
                <div style={{ display: "flex", alignItems: "baseline", gap: 8 }}>
                  <span className="serif" style={{ fontSize: 22, fontWeight: 600, color: "var(--ink-0)" }}>{c.stamina.recoveries.current}</span>
                  <span className="dim">/ {c.stamina.recoveries.max}</span>
                </div>
                <div className="dim mono" style={{ fontSize: 10, marginTop: 4 }}>{c.stamina.recoveries.value} stamina each</div>
                <MaxControl label="Cur" value={c.stamina.recoveries.current} style={{ marginTop: 4 }}

                <MaxControl label="Max" value={c.stamina.recoveries.max} style={{ marginTop: 2 }}
                  onChange={v => set("stamina", { ...c.stamina, recoveries: { ...c.stamina.recoveries, max: v } })}/>
                <MaxControl label="Each" value={c.stamina.recoveries.value} style={{ marginTop: 2 }}
                  onChange={v => set("stamina", { ...c.stamina, recoveries: { ...c.stamina.recoveries, value: v } })}/>
              </div>
              <div className="card" style={{ padding: "10px 14px", background: "var(--bg-0)" }}>
                <div className="eyebrow" style={{ marginBottom: 6 }}>
                  <Editable value={c.resource.name} onChange={v => set("resource.name", v)} placeholder="Resource"/>

                <PipTrack current={c.resource.current} max={c.resource.max}
                  onChange={v => set("resource.current", v)}/>
                <MaxControl label="Max" value={c.resource.max} max={30} style={{ marginTop: 6 }}
                  onChange={v => set("resource.max", v)}/>
              </div>

            </div>

            {/* Resource rules */}
            <div className="card" style={{ padding: "10px 14px", background: "var(--bg-0)", marginTop: 12 }}>
              <div className="eyebrow" style={{ marginBottom: 6 }}>Resource Rules</div>
              <div style={{ fontSize: 13, color: "var(--ink-1)", lineHeight: 1.5 }}>
                <Editable multiline value={c.resource.rules} onChange={v => set("resource.rules", v)}
                  placeholder="How this resource is gained and spent…"/>
              </div>
            </div>

            {/* XP + Victories strip */}
            <div style={{ display: "grid", gridTemplateColumns: "1.6fr 1fr", gap: 16, marginTop: 16 }}>
              <XPBar c={c} set={set}/>
              <VictoriesTrack c={c} set={set}/>
            </div>

            {/* Wealth / Renown / Hero tokens / Turn taken */}
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr 1.2fr", gap: 12, marginTop: 12 }}>
              <CounterTile label="Wealth" value={c.wealth ?? 0} icon="◆" tone="gold" onChange={v => set("wealth", Math.max(0, v))}/>
              <CounterTile label="Renown" value={c.renown ?? 0} icon="✦" tone="gold" onChange={v => set("renown", Math.max(0, v))}/>
              <CounterTile label="Hero Tokens" value={c.heroTokens ?? 0} icon="●" tone="ember" onChange={v => set("heroTokens", Math.max(0, v))}/>
              <TurnTakenTile taken={c.turnTaken ?? false} onToggle={() => set("turnTaken", !c.turnTaken)}/>
            </div>

            {/* Speed */}
            <div style={{ marginTop: 12 }}>
              <SpeedTile c={c} set={set}/>
            </div>
          </div>
        </div>
      </Card>

      {/* Section tabs */}
      <div className="scroll-x" style={{ display: "flex", gap: 4, borderBottom: "1px solid var(--line)", marginBottom: 20 }}>
        {sections.map(s => (
          <button key={s.id}
            onClick={() => setSection(s.id)}
            className="tab"
            style={{
              color: section === s.id ? "var(--ember)" : "var(--ink-2)",
              fontFamily: "var(--font-serif)",
              textTransform: "none",
              fontSize: 15,
              fontWeight: 500,
              letterSpacing: "0.01em",
              padding: "10px 18px",
              flex: "0 0 auto",
              whiteSpace: "nowrap",
            }}>
            {s.label}
            {section === s.id && <span style={{ position: "absolute", left: 18, right: 18, bottom: -1, height: 2, background: "var(--ember)", boxShadow: "0 0 8px var(--ember-glow)" }}/>}
          </button>
        ))}
      </div>

      {section === "abilities" && <AbilitiesPanel c={c} set={set}/>}
      {section === "features" && <FeaturesPanel c={c} set={set}/>}
      {section === "skills" && <SkillsPerksPanel c={c} set={set}/>}
      {section === "titles" && <TitlesPanel c={c} set={set}/>}
      {section === "origin" && <OriginPanel c={c} set={set}/>}
      {section === "projects" && <ProjectsPanel c={c} set={set}/>}
      {section === "inventory" && <InventoryPanel c={c} set={set}/>}
      {section === "ties" && <TiesPanel c={c} set={set}/>}
      {section === "conditions" && <ConditionsPanel c={c} set={set}/>}
      {section === "dice" && <DicePanel/>}
    </>
  );
}
