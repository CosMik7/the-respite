<script type="text/babel" data-presets="react">
// Media tab — folders, gallery, docs, links

function MediaTab() {
  const app = useApp();
  const { media, players, uploadMedia } = app;
  const [folder, setFolder] = useState("All");
  const [search, setSearch] = useState("");
  const [view, setView] = useState("grid");
  const [uploading, setUploading] = useState(false);
  const fileInputRef = useRef(null);

  const folders = ["All", ...Array.from(new Set(media.map(m => m.folder)))];
  const filtered = media.filter(m => {
    if (folder !== "All" && m.folder !== folder) return false;
    if (search && !(m.title.toLowerCase().includes(search.toLowerCase()) ||
                    m.tags.some(t => t.toLowerCase().includes(search.toLowerCase())))) return false;
    return true;
  });

  const handleFileSelect = async (e) => {
    const files = Array.from(e.target.files);
    if (!files.length) return;
    setUploading(true);
    const targetFolder = folder !== "All" ? folder : "Uploads";
    for (const file of files) {
      await uploadMedia(file, targetFolder);
    }
    setUploading(false);
    e.target.value = "";
  };

  return (
    <div className="page">
      <input type="file" ref={fileInputRef} onChange={handleFileSelect}
        accept="image/*,.pdf,.doc,.docx,.md,.txt" multiple style={{ display: "none" }}/>
      <SectionH eyebrow="The Vault" title="Media & references" action={
        <div style={{ display: "flex", gap: 8 }}>
          <button className={`btn ghost sm ${view === "grid" ? "ember" : ""}`} onClick={() => setView("grid")}>Grid</button>
          <button className={`btn ghost sm ${view === "list" ? "ember" : ""}`} onClick={() => setView("list")}>List</button>
          <button className="btn sm" onClick={() => fileInputRef.current?.click()} disabled={uploading}>
            {uploading ? "Uploading…" : "+ Upload"}
          </button>
        </div>
      }/>

      <div style={{ display: "grid", gridTemplateColumns: "220px 1fr", gap: 24 }}>
        {/* Sidebar */}
        <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
          <input
            type="text"
            placeholder="Search the vault…"
            value={search}
            onChange={e => setSearch(e.target.value)}
            style={{
              padding: "8px 12px", background: "var(--bg-1)",
              border: "1px solid var(--line)", borderRadius: 6,
              color: "var(--ink-0)", fontSize: 13, marginBottom: 8, outline: "none",
            }}
          />
          <div className="eyebrow" style={{ padding: "8px 4px 4px" }}>Folders</div>
          {folders.map(f => {
            const count = f === "All" ? media.length : media.filter(m => m.folder === f).length;
            const active = folder === f;
            return (
              <button key={f} onClick={() => setFolder(f)}
                style={{
                  display: "flex", justifyContent: "space-between", alignItems: "center",
                  padding: "8px 12px", borderRadius: 4, border: 0,
                  background: active ? "var(--bg-2)" : "transparent",
                  color: active ? "var(--ember)" : "var(--ink-1)",
                  textAlign: "left", fontSize: 13, fontFamily: "var(--font-serif)", fontWeight: active ? 600 : 400,
                  borderLeft: active ? "2px solid var(--ember)" : "2px solid transparent",
                }}>
                {f}
                <span className="dim mono" style={{ fontSize: 11 }}>{count}</span>
              </button>
            );
          })}
          <div className="eyebrow" style={{ padding: "16px 4px 4px" }}>Common Tags</div>
          <div style={{ display: "flex", flexWrap: "wrap", gap: 4, padding: "0 4px" }}>
            {["map", "portrait", "rules", "handout", "lore", "npc", "link"].map(t => (
              <button key={t} onClick={() => setSearch(t)}
                className="pill" style={{ cursor: "pointer", border: "1px solid var(--line)" }}>
                {t}
              </button>
            ))}
          </div>
        </div>

        {/* Content */}
        <div>
          <div className="dim mono" style={{ fontSize: 11, marginBottom: 12 }}>
            {filtered.length} item{filtered.length !== 1 ? "s" : ""} {folder !== "All" && `in ${folder}`}
          </div>
          {view === "grid" ? (
            <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(240px, 1fr))", gap: 16 }}>
              {filtered.map(m => <MediaCard key={m.id} m={m} players={players}/>)}
            </div>
          ) : (
            <div style={{ borderTop: "1px solid var(--line)" }}>
              {filtered.map(m => <MediaRow key={m.id} m={m} players={players}/>)}
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

function MediaCard({ m, players }) {
  const uploader = players.find(p => p.id === m.uploader);
  return (
    <div className="card" style={{ padding: 0, overflow: "hidden", cursor: "pointer", transition: "all 0.15s" }}
      onMouseEnter={e => { e.currentTarget.style.borderColor = "var(--ember-soft)"; }}
      onMouseLeave={e => { e.currentTarget.style.borderColor = "var(--line)"; }}>
      {m.kind === "image" && (
        m.storage_path
          ? <img src={m.url} alt={m.title} style={{ width: "100%", aspectRatio: "4/3", objectFit: "cover", display: "block", borderBottom: "1px solid var(--line)" }}/>
          : <PortraitPlaceholder tint="ember" label={m.placeholder} ratio="4 / 3" style={{ borderRadius: 0, border: 0, borderBottom: "1px solid var(--line)" }}/>
      )}
      {m.kind === "doc" && (
        <div style={{ aspectRatio: "4 / 3", background: "var(--bg-2)", borderBottom: "1px solid var(--line)", display: "grid", placeItems: "center", position: "relative" }}>
          <div className="serif" style={{ fontSize: 64, color: "var(--ember)", opacity: 0.5, fontFamily: "var(--font-display)" }}>{m.ext?.toUpperCase()}</div>
          <div className="dim mono" style={{ position: "absolute", bottom: 8, right: 12, fontSize: 10 }}>{m.size}</div>
        </div>
      )}
      {m.kind === "link" && (
        <div style={{ aspectRatio: "4 / 3", background: "linear-gradient(135deg, var(--bg-2), var(--bg-1))", borderBottom: "1px solid var(--line)", display: "grid", placeItems: "center", position: "relative" }}>
          <div style={{ textAlign: "center" }}>
            <div className="display" style={{ fontSize: 36, color: "var(--gold)", marginBottom: 4 }}>↗</div>
            <div className="dim mono" style={{ fontSize: 11 }}>{m.url}</div>
          </div>
        </div>
      )}
      <div style={{ padding: "10px 14px 12px" }}>
        <div className="serif" style={{ fontSize: 14, fontWeight: 600, color: "var(--ink-0)", marginBottom: 4, lineHeight: 1.2 }}>{m.title}</div>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
          <div className="dim" style={{ fontSize: 11 }}>{m.folder}</div>
          <div style={{ display: "flex", alignItems: "center", gap: 4 }}>
            {uploader && <Avatar player={uploader}/>}
          </div>
        </div>
      </div>
    </div>
  );
}

function MediaRow({ m, players }) {
  const uploader = players.find(p => p.id === m.uploader);
  const icon = m.kind === "image" ? "▦" : m.kind === "doc" ? "▤" : "↗";
  return (
    <div style={{
      display: "grid", gridTemplateColumns: "auto 1fr 100px 90px 100px auto", gap: 16,
      alignItems: "center", padding: "12px 4px", borderBottom: "1px solid var(--line)",
      cursor: "pointer", transition: "background 0.1s",
    }}
      onMouseEnter={e => e.currentTarget.style.background = "var(--bg-1)"}
      onMouseLeave={e => e.currentTarget.style.background = "transparent"}
    >
      <div className="serif" style={{ fontSize: 18, color: "var(--ember)", width: 24, textAlign: "center" }}>{icon}</div>
      <div>
        <div className="serif" style={{ fontSize: 14, color: "var(--ink-0)", fontWeight: 500 }}>{m.title}</div>
        <div style={{ display: "flex", gap: 4, marginTop: 4 }}>
          {m.tags.map(t => <span key={t} className="dim mono" style={{ fontSize: 10 }}>#{t}</span>)}
        </div>
      </div>
      <div className="dim" style={{ fontSize: 12 }}>{m.folder}</div>
      <div className="dim mono" style={{ fontSize: 11 }}>{m.size || m.ext || "link"}</div>
      <div className="dim" style={{ fontSize: 12 }}>{fmtDate(m.date)}</div>
      {uploader && <Avatar player={uploader}/>}
    </div>
  );
}

window.MediaTab = MediaTab;

</script>

<script type="text/babel" data-presets="react">
// Notes tab — shared timeline

function NotesTab() {
  const app = useApp();
  const { notes, players, sessions, meId, addNote } = app;
  const [filter, setFilter] = useState("all");
  const [draft, setDraft] = useState("");
  const [tagDraft, setTagDraft] = useState("");

  const sorted = [...notes].sort((a, b) => new Date(b.posted) - new Date(a.posted));
  const filtered = filter === "all" ? sorted : sorted.filter(n => n.tags.includes(filter));
  const allTags = Array.from(new Set(notes.flatMap(n => n.tags)));

  const post = () => {
    if (!draft.trim()) return;
    addNote({
      authorId: meId,
      body: draft.trim(),
      tags: tagDraft.split(",").map(t => t.trim()).filter(Boolean),
      sessionId: sessions.find(s => s.upcoming)?.id || null,
    });
    setDraft("");
    setTagDraft("");
  };

  const me = players.find(p => p.id === meId);

  return (
    <div className="page" style={{ maxWidth: 880 }}>
      <SectionH eyebrow="Memoria" title="The shared chronicle"/>

      {/* Composer */}
      <Card rail style={{ marginBottom: 28 }}>
        <div style={{ display: "grid", gridTemplateColumns: "auto 1fr", gap: 14 }}>
          <Avatar player={me} size="lg"/>
          <div>
            <div style={{ marginBottom: 6 }}>
              <span className="serif" style={{ color: "var(--ink-0)", fontWeight: 600, fontSize: 15 }}>{me.name}</span>
              <span className="dim italic serif" style={{ fontSize: 13, marginLeft: 8 }}>posts to the table</span>
            </div>
            <textarea
              value={draft}
              onChange={e => setDraft(e.target.value)}
              placeholder="Theory, recap, request, joke. Speak it into the page."
              style={{
                width: "100%", minHeight: 80, padding: "10px 12px",
                background: "var(--bg-0)", border: "1px solid var(--line)", borderRadius: 6,
                color: "var(--ink-0)", fontSize: 14, fontFamily: "var(--font-serif)", lineHeight: 1.55,
                outline: "none", resize: "vertical",
              }}
            />
            <div style={{ display: "flex", gap: 12, alignItems: "center", marginTop: 10 }}>
              <input
                value={tagDraft}
                onChange={e => setTagDraft(e.target.value)}
                placeholder="tags, comma, separated"
                style={{
                  flex: 1, padding: "6px 10px",
                  background: "var(--bg-0)", border: "1px solid var(--line)", borderRadius: 4,
                  color: "var(--ink-1)", fontSize: 12, fontFamily: "var(--font-mono)",
                  outline: "none",
                }}
              />
              <button className="btn ember" onClick={post}>Post to the chronicle</button>
            </div>
          </div>
        </div>
      </Card>

      {/* Filter */}
      <div style={{ display: "flex", gap: 6, marginBottom: 20, flexWrap: "wrap", alignItems: "center" }}>
        <span className="eyebrow" style={{ marginRight: 6 }}>Filter</span>
        <button className={`pill ${filter === "all" ? "ember" : ""}`} style={{ cursor: "pointer" }} onClick={() => setFilter("all")}>All · {notes.length}</button>
        {allTags.map(t => (
          <button key={t} className={`pill ${filter === t ? "ember" : ""}`} style={{ cursor: "pointer" }} onClick={() => setFilter(t)}>
            #{t} · {notes.filter(n => n.tags.includes(t)).length}
          </button>
        ))}
      </div>

      {/* Timeline */}
      <div style={{ position: "relative" }}>
        <div style={{ position: "absolute", left: 27, top: 0, bottom: 0, width: 1, background: "linear-gradient(180deg, transparent, var(--line) 8%, var(--line) 92%, transparent)" }}/>
        <div style={{ display: "flex", flexDirection: "column", gap: 18 }}>
          {filtered.map(n => <NoteEntry key={n.id} note={n} players={players} sessions={sessions}/>)}
        </div>
      </div>
    </div>
  );
}

function NoteEntry({ note, players, sessions }) {
  const author = players.find(p => p.id === note.authorId);
  const session = sessions.find(s => s.id === note.sessionId);

  return (
    <div style={{ display: "grid", gridTemplateColumns: "56px 1fr", gap: 14 }}>
      <div style={{ position: "relative", zIndex: 1 }}>
        <Avatar player={author} size="lg"/>
      </div>
      <Card style={{ background: "var(--bg-1)" }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", marginBottom: 8, flexWrap: "wrap", gap: 8 }}>
          <div>
            <span className="serif" style={{ color: "var(--ink-0)", fontWeight: 600, fontSize: 15 }}>{author?.name}</span>
            <span className="dim italic serif" style={{ fontSize: 12, marginLeft: 8 }}>· {fmtRelative(note.posted)}</span>
          </div>
          {session && (
            <span className="dim mono" style={{ fontSize: 10, letterSpacing: "0.06em", textTransform: "uppercase" }}>
              re: S{String(session.number).padStart(2, "0")} {session.title}
            </span>
          )}
        </div>
        <div className="serif" style={{ fontSize: 14.5, color: "var(--ink-1)", lineHeight: 1.65, whiteSpace: "pre-wrap" }}>
          {note.body}
        </div>
        <div style={{ display: "flex", gap: 6, marginTop: 12, flexWrap: "wrap" }}>
          {note.tags.map(t => (
            <span key={t} className="dim mono" style={{ fontSize: 11 }}>#{t}</span>
          ))}
          <div style={{ marginLeft: "auto", display: "flex", gap: 8 }}>
            <button className="dim" style={{ background: "transparent", border: 0, fontSize: 12, cursor: "pointer", padding: 0 }}>Reply</button>
            <button className="dim" style={{ background: "transparent", border: 0, fontSize: 12, cursor: "pointer", padding: 0 }}>↻</button>
          </div>
        </div>
      </Card>
    </div>
  );
}

window.NotesTab = NotesTab;

</script>

<script type="text/babel" data-presets="react">
// Dice tab — d4/d6/d8/d10/d12/d20 roller with history

function DiceTab() {
  const app = useApp();
  const { players, meId } = app;
  const me = players.find(p => p.id === meId);
  const [pool, setPool] = useState({ 4: 0, 6: 0, 8: 0, 10: 0, 12: 0, 20: 0 });
  const [modifier, setModifier] = useState(0);
  const [edge, setEdge] = useState("none"); // none | edge | bane | doubleEdge | doubleBane
  const [label, setLabel] = useState("");
  const [history, setHistory] = useState([]);
  const [rolling, setRolling] = useState(false);
  const [latest, setLatest] = useState(null);

  const dice = [4, 6, 8, 10, 12, 20];
  const total = Object.values(pool).reduce((a, b) => a + b, 0);

  const adjust = (d, delta) => setPool(p => ({ ...p, [d]: Math.max(0, p[d] + delta) }));
  const reset = () => { setPool({ 4: 0, 6: 0, 8: 0, 10: 0, 12: 0, 20: 0 }); setModifier(0); setEdge("none"); setLabel(""); };

  const rollOne = (sides) => Math.floor(Math.random() * sides) + 1;

  const roll = () => {
    if (total === 0) return;
    setRolling(true);

    // Drawsteel-style: 2d10 power roll baseline (when only d10s present we treat as power roll)
    const groups = dice.flatMap(d => Array.from({ length: pool[d] }).map(() => ({ sides: d, value: rollOne(d) })));

    // edge/bane modifier
    let edgeBonus = 0;
    if (edge === "edge") edgeBonus = 2;
    if (edge === "doubleEdge") edgeBonus = 4;
    if (edge === "bane") edgeBonus = -2;
    if (edge === "doubleBane") edgeBonus = -4;

    const sum = groups.reduce((a, g) => a + g.value, 0) + Number(modifier) + edgeBonus;

    // Power-roll tier interpretation if it's a 2d10 roll (Drawsteel canonical)
    let tier = null;
    if (pool[10] === 2 && Object.entries(pool).every(([k, v]) => k === "10" || v === 0)) {
      const base = sum;
      if (base <= 11) tier = 1;
      else if (base <= 16) tier = 2;
      else tier = 3;
      // natural 19-20 bumps tier
      const natSum = groups.reduce((a, g) => a + g.value, 0);
      if (natSum >= 19) tier = Math.min(3, tier + 1);
    }

    const result = {
      id: "r" + Date.now(),
      who: me.id,
      whoName: me.name,
      label: label || (tier ? "Power roll" : "Dice roll"),
      groups, modifier: Number(modifier), edge, edgeBonus,
      total: sum,
      tier,
      ts: new Date().toISOString(),
    };

    setTimeout(() => {
      setLatest(result);
      setHistory(h => [result, ...h].slice(0, 30));
      setRolling(false);
    }, 600);
  };

  const presets = [
    { name: "Power roll", desc: "2d10", apply: () => setPool({ 4: 0, 6: 0, 8: 0, 10: 2, 12: 0, 20: 0 }) },
    { name: "Damage (light)", desc: "2d6", apply: () => setPool({ 4: 0, 6: 2, 8: 0, 10: 0, 12: 0, 20: 0 }) },
    { name: "Damage (heavy)", desc: "2d8 + 1d6", apply: () => setPool({ 4: 0, 6: 1, 8: 2, 10: 0, 12: 0, 20: 0 }) },
    { name: "Big hit", desc: "1d12", apply: () => setPool({ 4: 0, 6: 0, 8: 0, 10: 0, 12: 1, 20: 0 }) },
    { name: "d20", desc: "1d20", apply: () => setPool({ 4: 0, 6: 0, 8: 0, 10: 0, 12: 0, 20: 1 }) },
  ];

  return (
    <div className="page">
      <SectionH eyebrow="The Bones" title="Dice" action={
        <span className="dim mono" style={{ fontSize: 11 }}>Rolling as <span style={{ color: "var(--ember)" }}>{me.name}</span></span>
      }/>

      <div style={{ display: "grid", gridTemplateColumns: "1.4fr 1fr", gap: 24 }}>
        {/* Builder */}
        <div style={{ display: "flex", flexDirection: "column", gap: 16 }}>
          <Card rail>
            <div className="flourish" style={{ justifyContent: "flex-start", marginBottom: 14 }}>The Pool</div>
            <div style={{ display: "grid", gridTemplateColumns: "repeat(3, 1fr)", gap: 12 }}>
              {dice.map(d => (
                <DieControl key={d} sides={d} count={pool[d]}
                  onInc={() => adjust(d, +1)}
                  onDec={() => adjust(d, -1)}
                  onClear={() => setPool(p => ({ ...p, [d]: 0 }))}/>
              ))}
            </div>
          </Card>

          <Card>
            <div className="flourish" style={{ justifyContent: "flex-start", marginBottom: 14 }}>Modifiers</div>
            <div style={{ display: "grid", gridTemplateColumns: "1fr 2fr", gap: 16, alignItems: "start" }}>
              <div>
                <div className="eyebrow" style={{ marginBottom: 6 }}>Flat bonus</div>
                <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
                  <button className="btn ghost sm" onClick={() => setModifier(m => m - 1)}>−</button>
                  <input type="number" value={modifier} onChange={e => setModifier(parseInt(e.target.value || 0))}
                    style={{ width: 64, textAlign: "center", padding: "6px 8px", background: "var(--bg-0)", border: "1px solid var(--line)", borderRadius: 4, color: "var(--ink-0)", fontSize: 16, fontFamily: "var(--font-serif)", fontWeight: 600 }}/>
                  <button className="btn ghost sm" onClick={() => setModifier(m => m + 1)}>+</button>
                </div>
              </div>
              <div>
                <div className="eyebrow" style={{ marginBottom: 6 }}>Edge / Bane</div>
                <div style={{ display: "grid", gridTemplateColumns: "repeat(5, 1fr)", gap: 4 }}>
                  {[
                    { v: "doubleBane", label: "−−", color: "blood" },
                    { v: "bane", label: "−", color: "blood" },
                    { v: "none", label: "·", color: "" },
                    { v: "edge", label: "+", color: "moss" },
                    { v: "doubleEdge", label: "++", color: "moss" },
                  ].map(o => (
                    <button key={o.v} onClick={() => setEdge(o.v)}
                      className={`btn sm ${edge === o.v ? "ember" : "ghost"}`}
                      style={{ padding: "6px 4px", fontFamily: "var(--font-serif)", fontSize: 16, fontWeight: 600 }}>
                      {o.label}
                    </button>
                  ))}
                </div>
                <div className="dim mono" style={{ fontSize: 10, marginTop: 6 }}>−− to ++ shifts result by ±2 / ±4</div>
              </div>
            </div>

            <div className="rule"></div>

            <div className="eyebrow" style={{ marginBottom: 6 }}>Label (optional)</div>
            <input value={label} onChange={e => setLabel(e.target.value)} placeholder="e.g. Twin Fang vs Wakeknight"
              style={{ width: "100%", padding: "8px 12px", background: "var(--bg-0)", border: "1px solid var(--line)", borderRadius: 4, color: "var(--ink-0)", fontSize: 13, fontFamily: "var(--font-serif)", fontStyle: "italic", outline: "none" }}/>
          </Card>

          <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
            <button className="btn ember" disabled={total === 0 || rolling} onClick={roll}
              style={{ flex: 1, padding: "14px 20px", fontSize: 15, opacity: total === 0 ? 0.4 : 1, cursor: total === 0 ? "not-allowed" : "pointer" }}>
              {rolling ? "Rolling…" : total === 0 ? "Pick at least one die" : `Cast ${total} ${total === 1 ? "die" : "dice"}`}
            </button>
            <button className="btn ghost" onClick={reset}>Reset</button>
          </div>

          <div>
            <div className="eyebrow" style={{ marginBottom: 8 }}>Quick presets</div>
            <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>
              {presets.map(p => (
                <button key={p.name} className="btn ghost sm" onClick={p.apply}
                  style={{ display: "flex", flexDirection: "column", gap: 2, padding: "6px 12px", alignItems: "flex-start" }}>
                  <span className="serif" style={{ fontSize: 13, color: "var(--ink-0)" }}>{p.name}</span>
                  <span className="dim mono" style={{ fontSize: 10 }}>{p.desc}</span>
                </button>
              ))}
            </div>
          </div>
        </div>

        {/* Result + history */}
        <div style={{ display: "flex", flexDirection: "column", gap: 16 }}>
          <ResultCard latest={latest} rolling={rolling}/>
          <Card>
            <SectionH eyebrow="Recent" title="At the table" action={history.length > 0 && (
              <button className="btn ghost sm" onClick={() => setHistory([])}>Clear</button>
            )}/>
            {history.length === 0 ? (
              <div className="muted serif italic" style={{ fontSize: 13, textAlign: "center", padding: "20px 0" }}>
                No rolls yet. The bones are quiet.
              </div>
            ) : (
              <div style={{ display: "flex", flexDirection: "column" }}>
                {history.map(r => <HistoryRow key={r.id} r={r}/>)}
              </div>
            )}
          </Card>
        </div>
      </div>
    </div>
  );
}

function DieControl({ sides, count, onInc, onDec, onClear }) {
  const active = count > 0;
  return (
    <div className="card" style={{ padding: "14px 12px", background: active ? "var(--bg-2)" : "var(--bg-0)", border: active ? "1px solid var(--ember)" : "1px solid var(--line)", boxShadow: active ? "0 0 0 1px oklch(0.70 0.17 45 / 0.25), var(--shadow-glow)" : "none", transition: "all 0.15s" }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10 }}>
        <DieGlyph sides={sides} active={active}/>
        <div className="serif" style={{ fontSize: 28, fontWeight: 600, color: active ? "var(--ember)" : "var(--ink-3)", fontVariantNumeric: "tabular-nums", lineHeight: 1, textShadow: active ? "0 0 12px oklch(0.70 0.17 45 / 0.5)" : "none" }}>
          {count}
        </div>
      </div>
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 4 }}>
        <button className="btn ghost sm" onClick={onDec} style={{ padding: "5px 0" }}>−</button>
        <button className="btn ghost sm" onClick={onInc} style={{ padding: "5px 0" }}>+</button>
      </div>
    </div>
  );
}

function DieGlyph({ sides, active }) {
  // Simple inline shape per die — square (d4 triangle), hex, octagon, etc.
  const color = active ? "var(--ember)" : "var(--ink-2)";
  const stroke = active ? "var(--ember)" : "var(--line-strong)";
  const shapes = {
    4: <polygon points="20,4 36,32 4,32" fill="none" stroke={stroke} strokeWidth="1.5"/>,
    6: <rect x="6" y="6" width="28" height="28" fill="none" stroke={stroke} strokeWidth="1.5" transform="rotate(8 20 20)"/>,
    8: <polygon points="20,4 32,12 32,28 20,36 8,28 8,12" fill="none" stroke={stroke} strokeWidth="1.5"/>,
    10: <polygon points="20,4 36,16 28,34 12,34 4,16" fill="none" stroke={stroke} strokeWidth="1.5"/>,
    12: <polygon points="20,3 32,9 36,22 28,33 12,33 4,22 8,9" fill="none" stroke={stroke} strokeWidth="1.5"/>,
    20: <polygon points="20,2 36,12 36,28 20,38 4,28 4,12" fill="none" stroke={stroke} strokeWidth="1.5"/>,
  };
  return (
    <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
      <svg width="36" height="36" viewBox="0 0 40 40" style={{ filter: active ? "drop-shadow(0 0 6px oklch(0.70 0.17 45 / 0.6))" : "none" }}>
        {shapes[sides]}
      </svg>
      <div className="serif" style={{ fontSize: 18, fontWeight: 600, color, lineHeight: 1 }}>d{sides}</div>
    </div>
  );
}

function ResultCard({ latest, rolling }) {
  if (rolling) {
    return (
      <Card style={{ background: "linear-gradient(135deg, var(--bg-1), var(--bg-2))", textAlign: "center", padding: "40px 20px" }}>
        <div className="serif italic" style={{ color: "var(--ember)", fontSize: 22, animation: "ember-pulse 0.7s ease-in-out infinite" }}>The bones tumble…</div>
      </Card>
    );
  }
  if (!latest) {
    return (
      <Card style={{ textAlign: "center", padding: "40px 20px", background: "linear-gradient(135deg, var(--bg-1), var(--bg-2))" }}>
        <div className="display" style={{ color: "var(--ember)", fontSize: 28, marginBottom: 8 }}>The Bones Wait</div>
        <div className="muted serif italic" style={{ fontSize: 14 }}>Build a pool, then cast.</div>
      </Card>
    );
  }
  const tierLabel = latest.tier === 1 ? "Tier I" : latest.tier === 2 ? "Tier II" : latest.tier === 3 ? "Tier III" : null;
  return (
    <Card rail style={{ background: "linear-gradient(135deg, var(--bg-1), var(--bg-2))", padding: "24px 26px" }}>
      <div className="eyebrow" style={{ marginBottom: 4 }}>{latest.label}</div>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-end", gap: 16, marginBottom: 16 }}>
        <div className="serif" style={{ fontSize: 64, fontWeight: 600, color: "var(--ember)", lineHeight: 1, fontVariantNumeric: "tabular-nums", textShadow: "0 0 24px oklch(0.70 0.17 45 / 0.5)" }}>
          {latest.total}
        </div>
        {tierLabel && (
          <div style={{ textAlign: "right" }}>
            <div className="display" style={{ color: latest.tier === 3 ? "var(--gold)" : "var(--ember)", fontSize: 22 }}>{tierLabel}</div>
            <div className="dim mono" style={{ fontSize: 10 }}>power roll</div>
          </div>
        )}
      </div>

      <div style={{ display: "flex", flexWrap: "wrap", gap: 6, marginBottom: 12 }}>
        {latest.groups.map((g, i) => (
          <div key={i} style={{
            display: "grid", placeItems: "center", minWidth: 36, padding: "4px 8px",
            background: g.value === g.sides ? "oklch(0.55 0.10 140 / 0.25)" : g.value === 1 ? "oklch(0.40 0.10 25 / 0.25)" : "var(--bg-0)",
            border: `1px solid ${g.value === g.sides ? "var(--moss)" : g.value === 1 ? "var(--blood)" : "var(--line-strong)"}`,
            borderRadius: 4,
          }}>
            <div className="serif" style={{ fontSize: 18, fontWeight: 600, color: "var(--ink-0)", lineHeight: 1, fontVariantNumeric: "tabular-nums" }}>{g.value}</div>
            <div className="dim mono" style={{ fontSize: 9, marginTop: 1 }}>d{g.sides}</div>
          </div>
        ))}
        {latest.modifier !== 0 && (
          <div style={{ display: "grid", placeItems: "center", padding: "4px 10px", background: "var(--bg-0)", border: "1px solid var(--line-strong)", borderRadius: 4 }}>
            <div className="serif" style={{ fontSize: 18, fontWeight: 600, color: "var(--ink-1)", lineHeight: 1 }}>{latest.modifier > 0 ? `+${latest.modifier}` : latest.modifier}</div>
            <div className="dim mono" style={{ fontSize: 9, marginTop: 1 }}>mod</div>
          </div>
        )}
        {latest.edgeBonus !== 0 && (
          <div style={{ display: "grid", placeItems: "center", padding: "4px 10px", background: latest.edgeBonus > 0 ? "oklch(0.55 0.10 140 / 0.20)" : "oklch(0.40 0.10 25 / 0.20)", border: `1px solid ${latest.edgeBonus > 0 ? "var(--moss)" : "var(--blood)"}`, borderRadius: 4 }}>
            <div className="serif" style={{ fontSize: 18, fontWeight: 600, color: "var(--ink-0)", lineHeight: 1 }}>{latest.edgeBonus > 0 ? `+${latest.edgeBonus}` : latest.edgeBonus}</div>
            <div className="dim mono" style={{ fontSize: 9, marginTop: 1 }}>{latest.edgeBonus > 0 ? "edge" : "bane"}</div>
          </div>
        )}
      </div>

      <div className="dim mono" style={{ fontSize: 10 }}>
        {latest.whoName} · {fmtRelative(latest.ts)}
      </div>
    </Card>
  );
}

function HistoryRow({ r }) {
  const tierLabel = r.tier === 1 ? "I" : r.tier === 2 ? "II" : r.tier === 3 ? "III" : null;
  return (
    <div style={{ display: "grid", gridTemplateColumns: "auto 1fr auto", gap: 12, alignItems: "center", padding: "8px 0", borderBottom: "1px solid var(--line)" }}>
      <div className="serif" style={{ fontSize: 22, fontWeight: 600, color: "var(--ember)", fontVariantNumeric: "tabular-nums", minWidth: 36, textAlign: "center" }}>{r.total}</div>
      <div>
        <div className="serif" style={{ fontSize: 13, color: "var(--ink-0)" }}>{r.label}</div>
        <div className="dim mono" style={{ fontSize: 10, marginTop: 2 }}>
          {r.groups.map((g, i) => `${i > 0 ? "+" : ""}${g.value}(d${g.sides})`).join("")}
          {r.modifier !== 0 && (r.modifier > 0 ? `+${r.modifier}` : r.modifier)}
          {r.edgeBonus !== 0 && (r.edgeBonus > 0 ? `+${r.edgeBonus}` : r.edgeBonus)}
        </div>
      </div>
      <div style={{ textAlign: "right" }}>
        {tierLabel && <div className="display" style={{ fontSize: 14, color: r.tier === 3 ? "var(--gold)" : "var(--ember)" }}>{tierLabel}</div>}
        <div className="dim mono" style={{ fontSize: 9 }}>{r.whoName}</div>
      </div>
    </div>
  );
}

window.DiceTab = DiceTab;

</script>

<script type="text/babel" data-presets="react">
// Auth screens: loading, sign-in, first-login profile claim

function AppLoading({ message = "Loading…" }) {
  return (
    <div style={{
      minHeight: "100vh", display: "flex", flexDirection: "column",
      alignItems: "center", justifyContent: "center",
      background: "var(--bg-0)", gap: 20, padding: 20,
    }}>
      <div className="display" style={{ fontSize: 44, color: "var(--ember)", lineHeight: 1 }}>The Respite</div>
      <div className="serif italic" style={{ color: "var(--ink-2)", fontSize: 14 }}>{message}</div>
    </div>
  );
}

function LoginScreen() {
  const [mode, setMode] = useState("signin"); // "signin" | "signup"
  const [email, setEmail] = useState("");
  const [password, setPassword] = useState("");
  const [error, setError] = useState("");
  const [notice, setNotice] = useState("");
  const [loading, setLoading] = useState(false);

  const isSignup = mode === "signup";

  const inputStyle = {
    padding: "9px 12px", background: "var(--bg-2)",
    border: "1px solid var(--line)", borderRadius: 5,
    color: "var(--ink-0)", fontSize: 14, outline: "none",
    fontFamily: "var(--font-sans)", width: "100%",
  };

  const handleSubmit = async (e) => {
    e.preventDefault();
    setLoading(true);
    setError("");
    setNotice("");
    const creds = { email: email.trim(), password };
    if (isSignup) {
      const { data, error: err } = await window._db.auth.signUp(creds);
      setLoading(false);
      if (err) { setError(err.message); return; }
      // If email confirmation is required, there's no session yet.
      if (!data.session) {
        setNotice("Account created. Check your email to confirm, then sign in.");
        setMode("signin");
        setPassword("");
      }
      // else: onAuthStateChange in App() routes to ClaimProfile automatically
    } else {
      const { error: err } = await window._db.auth.signInWithPassword(creds);
      setLoading(false);
      if (err) setError(err.message);
      // success: onAuthStateChange in App() handles navigation
    }
  };

  const switchMode = () => {
    setMode(isSignup ? "signin" : "signup");
    setError("");
    setNotice("");
  };

  return (
    <div style={{
      minHeight: "100vh", display: "flex", alignItems: "center", justifyContent: "center",
      background: "var(--bg-0)", padding: 20,
    }}>
      <div style={{ width: "100%", maxWidth: 380 }}>
        <div style={{ textAlign: "center", marginBottom: 40 }}>
          <div className="display" style={{ fontSize: 54, color: "var(--ember)", lineHeight: 1, marginBottom: 8 }}>The Respite</div>
          <div className="serif italic" style={{ color: "var(--ink-2)", fontSize: 15 }}>A Drawsteel companion</div>
        </div>
        <div className="card" style={{ padding: "28px 32px", background: "var(--bg-1)" }}>
          <div className="flourish" style={{ marginBottom: 24, justifyContent: "center" }}>{isSignup ? "Create account" : "Sign in"}</div>
          <form onSubmit={handleSubmit} style={{ display: "flex", flexDirection: "column", gap: 16 }}>
            <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
              <label className="eyebrow" style={{ fontSize: 10 }}>Email</label>
              <input type="email" value={email} onChange={e => setEmail(e.target.value)}
                placeholder="your@email.com" required style={inputStyle}/>
            </div>
            <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
              <label className="eyebrow" style={{ fontSize: 10 }}>Password</label>
              <input type="password" value={password} onChange={e => setPassword(e.target.value)}
                placeholder="••••••••" required minLength={6} style={inputStyle}/>
              {isSignup && <span className="dim" style={{ fontSize: 11 }}>At least 6 characters.</span>}
            </div>
            {notice && (
              <div style={{
                padding: "8px 12px", borderRadius: 4, fontSize: 13,
                background: "oklch(0.25 0.06 150 / 0.3)", border: "1px solid oklch(0.40 0.08 150)",
                color: "var(--ink-0)",
              }}>{notice}</div>
            )}
            {error && (
              <div style={{
                padding: "8px 12px", borderRadius: 4, fontSize: 13,
                background: "oklch(0.25 0.08 25 / 0.3)", border: "1px solid oklch(0.40 0.10 25)",
                color: "var(--blood)",
              }}>{error}</div>
            )}
            <button type="submit" disabled={loading} className="btn"
              style={{ padding: "11px 0", fontSize: 14, marginTop: 4, justifyContent: "center", width: "100%" }}>
              {loading
                ? (isSignup ? "Creating…" : "Signing in…")
                : (isSignup ? "Create account →" : "Sign in →")}
            </button>
          </form>
          <div style={{ textAlign: "center", marginTop: 20, fontSize: 13, color: "var(--ink-2)" }}>
            {isSignup ? "Already have an account? " : "Don't have an account? "}
            <button type="button" onClick={switchMode}
              style={{ background: "none", border: "none", padding: 0, cursor: "pointer",
                color: "var(--ember)", fontSize: 13, fontFamily: "var(--font-sans)", textDecoration: "underline" }}>
              {isSignup ? "Sign in" : "Sign up"}
            </button>
          </div>
        </div>
        <div className="dim mono" style={{ textAlign: "center", fontSize: 10, marginTop: 20, letterSpacing: "0.06em" }}>
          THE RESPITE · PRIVATE · FOR THE PARTY OF FIVE
        </div>
      </div>
    </div>
  );
}

// Avatar colour palette available to custom characters
const AVATAR_COLORS = [
  "ember", "gold", "copper", "blood", "rose",
  "moss", "jade", "teal", "frost", "sapphire",
  "arcane", "amethyst", "slate", "ink", "bone",
];

// A structurally-complete, empty character so the sheet renders without crashing.
// Player presentation meta (avatar/role/pronouns/handle) rides along under `_player`
// so we don't need any extra DB columns.
function blankCharacter({ ownerId, name, pronouns, cls, avatar, playerName, handle }) {
  const av = avatar || "arcane";
  const h = handle || ("@" + String(playerName || name || "player").toLowerCase().replace(/[^a-z0-9]/g, ""));
  return {
    ownerId,
    name: name || "New Adventurer",
    pronouns: pronouns || "",
    ancestry: "",
    career: "",
    careerData: { benefits: "", skills: [], perk: "", incident: "" },
    culture: { languages: [], environment: "", environmentBenefit: "", organization: "", organizationBenefit: "", upbringing: "", upbringingBenefit: "", complications: [] },
    cls: cls || "",
    kit: "",
    kitData: { armor: "", weapon: "", stamina: "", speed: "", stability: "", melee: "", ranged: "", disengage: "", benefit: "" },
    titleList: [],
    ancestryTraits: [],
    speed: { run: 5, climb: 0, swim: 0, fly: 0 },
    level: 1,
    xp: { current: 0, next: 15 },
    victories: 0,
    surges: 0,
    portrait: "",
    portraitTint: av,
    titles: [""],
    stamina: { current: 20, max: 20, recoveries: { current: 8, max: 8, value: 6 } },
    resource: { name: "Resource", current: 0, max: 0, rules: "" },
    characteristics: { Might: 0, Agility: 0, Reason: 0, Intuition: 0, Presence: 0 },
    abilities: [],
    features: [],
    inventory: [],
    ties: [],
    backstory: "",
    goals: [],
    conditions: [],
    notes: "",
    weaknesses: [],
    immunities: [],
    wealth: 0,
    renown: 0,
    tempStamina: 0,
    heroTokens: 0,
    turnTaken: false,
    skills: [],
    perks: [],
    projects: [],
    _player: { avatar: av, role: "Player", pronouns: pronouns || "", handle: h },
  };
}

// Merge the premade roster with any custom players (those have a row in
// player_profiles whose player_id isn't one of the premade slots). Custom
// presentation meta is pulled from the character's `_player` blob.
function buildRoster(profiles, charsMap) {
  const base = window.BASE_PLAYERS || window.PLAYERS;
  const baseIds = new Set(base.map(p => p.id));
  const roster = base.map(p => ({ ...p }));
  (profiles || []).forEach(prof => {
    if (baseIds.has(prof.player_id)) return; // premade slot already in roster
    const char = (charsMap && charsMap[prof.player_id]) || {};
    const meta = char._player || {};
    const nm = prof.name || char.name || "Adventurer";
    roster.push({
      id: prof.player_id,
      name: nm,
      handle: meta.handle || ("@" + String(nm).toLowerCase().replace(/[^a-z0-9]/g, "")),
      role: meta.role || "Player",
      avatar: meta.avatar || "arcane",
      initials: (String(nm).trim().charAt(0) || "?").toUpperCase(),
      pronouns: meta.pronouns || char.pronouns || "",
      joined: meta.joined || new Date().toISOString().split("T")[0],
      custom: true,
    });
  });
  return roster;
}

function ClaimProfile({ userId, onClaimed }) {
  const [claimed, setClaimed] = useState([]);
  const [loading, setLoading] = useState(false);
  const [fetching, setFetching] = useState(true);
  const [claimError, setClaimError] = useState("");
  const [mode, setMode] = useState("pick"); // "pick" | "create"

  // create-form fields
  const [playerName, setPlayerName] = useState("");
  const [charName, setCharName] = useState("");
  const [charClass, setCharClass] = useState("");
  const [charPronouns, setCharPronouns] = useState("");
  const [avatar, setAvatar] = useState("arcane");

  useEffect(() => {
    window._db.from("player_profiles").select("player_id").then(({ data }) => {
      if (data) setClaimed(data.map(p => p.player_id));
      setFetching(false);
    });
  }, []);

  const inputStyle = {
    padding: "9px 12px", background: "var(--bg-2)",
    border: "1px solid var(--line)", borderRadius: 5,
    color: "var(--ink-0)", fontSize: 14, outline: "none",
    fontFamily: "var(--font-sans)", width: "100%",
  };

  const claim = async (player) => {
    setLoading(true);
    setClaimError("");
    const { error } = await window._db.from("player_profiles").insert({
      id: userId, player_id: player.id, name: player.name,
    });
    if (!error) {
      onClaimed(player.id);
    } else {
      setLoading(false);
      setClaimError(error.message);
    }
  };

  const createOwn = async (e) => {
    e.preventDefault();
    setLoading(true);
    setClaimError("");
    const playerId = "u_" + Math.random().toString(36).slice(2, 10);
    const char = blankCharacter({
      ownerId: playerId,
      name: charName.trim(),
      pronouns: charPronouns.trim(),
      cls: charClass.trim(),
      avatar,
      playerName: playerName.trim(),
    });
    // 1) link this auth user to the new player slot FIRST — RLS on `characters`
    //    typically checks ownership via player_profiles, so the link must exist
    //    before we can write the character row.
    const { error: profErr } = await window._db.from("player_profiles")
      .insert({ id: userId, player_id: playerId, name: playerName.trim() || charName.trim() });
    if (profErr) { setLoading(false); setClaimError(profErr.message); return; }
    // 2) create the character row
    const { error: charErr } = await window._db.from("characters")
      .insert({ player_id: playerId, data: char });
    if (charErr) { setLoading(false); setClaimError(charErr.message); return; }
    onClaimed(playerId);
  };

  const signOut = () => window._db.auth.signOut();

  const available = (window.BASE_PLAYERS || window.PLAYERS).filter(p => !claimed.includes(p.id));

  return (
    <div style={{
      minHeight: "100vh", display: "flex", alignItems: "center", justifyContent: "center",
      background: "var(--bg-0)", padding: 20,
    }}>
      <div style={{ width: "100%", maxWidth: 520 }}>
        <div style={{ textAlign: "center", marginBottom: 40 }}>
          <div className="display" style={{ fontSize: 54, color: "var(--ember)", lineHeight: 1, marginBottom: 8 }}>The Respite</div>
          <div className="serif italic" style={{ color: "var(--ink-2)", fontSize: 15 }}>
            {fetching ? "A moment…" : mode === "create" ? "Forge a new adventurer." : "First time here. Who are you?"}
          </div>
        </div>

        {!fetching && mode === "create" && (
          <div className="card" style={{ padding: "28px 32px", background: "var(--bg-1)" }}>
            <div className="flourish" style={{ marginBottom: 24, justifyContent: "center" }}>Create your character</div>
            <form onSubmit={createOwn} style={{ display: "flex", flexDirection: "column", gap: 16 }}>
              <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
                <label className="eyebrow" style={{ fontSize: 10 }}>Your name (the player)</label>
                <input value={playerName} onChange={e => setPlayerName(e.target.value)}
                  placeholder="e.g. Miguel" required style={inputStyle}/>
              </div>
              <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
                <label className="eyebrow" style={{ fontSize: 10 }}>Character name</label>
                <input value={charName} onChange={e => setCharName(e.target.value)}
                  placeholder="e.g. Kael of the Ashlands" required style={inputStyle}/>
              </div>
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 }}>
                <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
                  <label className="eyebrow" style={{ fontSize: 10 }}>Class</label>
                  <input value={charClass} onChange={e => setCharClass(e.target.value)}
                    placeholder="e.g. Censor" style={inputStyle}/>
                </div>
                <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
                  <label className="eyebrow" style={{ fontSize: 10 }}>Pronouns</label>
                  <input value={charPronouns} onChange={e => setCharPronouns(e.target.value)}
                    placeholder="e.g. they/them" style={inputStyle}/>
                </div>
              </div>
              <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
                <label className="eyebrow" style={{ fontSize: 10 }}>Avatar colour</label>
                <div style={{ display: "flex", gap: 10, flexWrap: "wrap" }}>
                  {AVATAR_COLORS.map(c => (
                    <button type="button" key={c} onClick={() => setAvatar(c)}
                      title={c}
                      style={{ padding: 0, border: avatar === c ? "2px solid var(--ink-0)" : "2px solid transparent",
                        borderRadius: "50%", background: "none", cursor: "pointer", lineHeight: 0 }}>
                      <div className={`avatar ${c}`}>{(playerName.trim().charAt(0) || "?").toUpperCase()}</div>
                    </button>
                  ))}
                </div>
              </div>
              {claimError && (
                <div style={{ padding: "8px 12px", borderRadius: 4, fontSize: 13, background: "oklch(0.25 0.08 25 / 0.3)", border: "1px solid oklch(0.40 0.10 25)", color: "var(--blood)" }}>
                  {claimError}
                </div>
              )}
              <button type="submit" disabled={loading} className="btn"
                style={{ padding: "11px 0", fontSize: 14, marginTop: 4, justifyContent: "center", width: "100%" }}>
                {loading ? "Forging…" : "Create & enter →"}
              </button>
            </form>
            <div style={{ textAlign: "center", marginTop: 20, fontSize: 13, color: "var(--ink-2)" }}>
              <button type="button" onClick={() => { setMode("pick"); setClaimError(""); }}
                style={{ background: "none", border: "none", padding: 0, cursor: "pointer", color: "var(--ember)", fontSize: 13, fontFamily: "var(--font-sans)", textDecoration: "underline" }}>
                ← Pick a premade character instead
              </button>
            </div>
          </div>
        )}

        {!fetching && mode === "pick" && (
          <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
            {available.length === 0 ? (
              <div className="card" style={{ padding: 24, textAlign: "center", background: "var(--bg-1)" }}>
                <div className="serif" style={{ fontSize: 16, color: "var(--ink-0)", marginBottom: 8 }}>All premade slots are taken.</div>
                <div className="dim" style={{ fontSize: 13 }}>Create your own character below, or ask Mr. The Ghoul to free a slot.</div>
              </div>
            ) : available.map(player => {
              const char = window.CHARACTERS[player.id];
              return (
                <button key={player.id} onClick={() => claim(player)} disabled={loading}
                  className="card"
                  style={{
                    display: "grid", gridTemplateColumns: "auto 1fr auto",
                    alignItems: "center", gap: 16, padding: "14px 18px",
                    textAlign: "left", cursor: loading ? "default" : "pointer",
                    background: "var(--bg-1)", border: "1px solid var(--line)", transition: "all 0.15s",
                  }}
                  onMouseEnter={e => { if (!loading) e.currentTarget.style.borderColor = "var(--ember)"; }}
                  onMouseLeave={e => { e.currentTarget.style.borderColor = ""; }}
                >
                  <Avatar player={player}/>
                  <div>
                    <div className="serif" style={{ fontSize: 18, fontWeight: 600, color: "var(--ink-0)", marginBottom: 3 }}>{player.name}</div>
                    <div className="dim" style={{ fontSize: 12 }}>{player.role}{char ? ` · ${char.name}, ${char.cls}` : ""}</div>
                  </div>
                  <div className="serif" style={{ fontSize: 22, color: "var(--ember)", opacity: 0.5 }}>→</div>
                </button>
              );
            })}

            <button onClick={() => { setMode("create"); setClaimError(""); }} disabled={loading}
              className="card"
              style={{
                display: "grid", gridTemplateColumns: "auto 1fr auto",
                alignItems: "center", gap: 16, padding: "14px 18px",
                textAlign: "left", cursor: "pointer",
                background: "var(--bg-2)", border: "1px dashed var(--ember)", transition: "all 0.15s",
              }}
              onMouseEnter={e => { e.currentTarget.style.background = "var(--bg-1)"; }}
              onMouseLeave={e => { e.currentTarget.style.background = "var(--bg-2)"; }}
            >
              <div className="avatar" style={{ background: "var(--bg-0)", border: "1px dashed var(--ember)", color: "var(--ember)" }}>+</div>
              <div>
                <div className="serif" style={{ fontSize: 18, fontWeight: 600, color: "var(--ember)", marginBottom: 3 }}>Create your own character</div>
                <div className="dim" style={{ fontSize: 12 }}>Build a brand-new adventurer from scratch</div>
              </div>
              <div className="serif" style={{ fontSize: 22, color: "var(--ember)", opacity: 0.5 }}>→</div>
            </button>
          </div>
        )}

        {mode === "pick" && claimError && (
          <div style={{ marginTop: 16, padding: "8px 12px", borderRadius: 4, fontSize: 13, background: "oklch(0.25 0.08 25 / 0.3)", border: "1px solid oklch(0.40 0.10 25)", color: "var(--blood)" }}>
            {claimError}
          </div>
        )}

        {!fetching && (
          <div style={{ textAlign: "center", marginTop: 28 }}>
            <button type="button" onClick={signOut} disabled={loading}
              style={{ background: "none", border: "none", padding: 0, cursor: "pointer", color: "var(--ink-3)", fontSize: 12, fontFamily: "var(--font-sans)", textDecoration: "underline" }}>
              Sign out
            </button>
          </div>
        )}
      </div>
    </div>
  );
}

window.AppLoading = AppLoading;
window.LoginScreen = LoginScreen;
window.ClaimProfile = ClaimProfile;
window.blankCharacter = blankCharacter;
window.buildRoster = buildRoster;
</script>

<script type="text/babel" data-presets="react">
// useState/useEffect already pulled from React in ui.jsx (shared babel scope)

const TWEAK_DEFAULTS = {
  "theme": "obsidian",
  "sheetLayout": "spread",
  "showSigil": true
};

function App() {
  const [tweaks, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const [tab, setTab] = useState("hub");

  // authState: "booting" | "unauthenticated" | "claiming" | "loading" | "ready"
  const [authState, setAuthState] = useState("booting");
  const [authUserId, setAuthUserId] = useState(null);
  const [meId, setMeId] = useState(null);
  const [selectedPlayer, setSelectedPlayer] = useState(null);

  // Refs mirror auth state so the auth listener can read current values without
  // re-subscribing, and decide whether an event needs a full reload.
  const authStateRef = useRef("booting");
  useEffect(() => { authStateRef.current = authState; }, [authState]);
  const authUserIdRef = useRef(null);
  useEffect(() => { authUserIdRef.current = authUserId; }, [authUserId]);

  const [players, setPlayers] = useState(window.PLAYERS);
  const [sessions, setSessions] = useState(window.SESSIONS);
  const [characters, setCharacters] = useState(window.CHARACTERS);
  const [media, setMedia] = useState(window.MEDIA);
  const [notes, setNotes] = useState(window.NOTES);

  // Ref mirrors characters state so mutations can read current value synchronously
  const charactersRef = useRef(window.CHARACTERS);
  useEffect(() => { charactersRef.current = characters; }, [characters]);

  // Debounced write queue — batches rapid pip/counter clicks into one DB write
  const charWriteQueue = useRef({});
  const charWriteTimer = useRef(null);

  useEffect(() => {
    document.documentElement.dataset.theme = tweaks.theme === "obsidian" ? "" : tweaks.theme;
  }, [tweaks.theme]);

  // ─── Data loading (seeds from window.* if DB is empty) ────────────────────

  const loadAllData = useCallback(async () => {
    const { data: chars } = await window._db.from("characters").select("*");
    let charsMap = { ...window.CHARACTERS };
    if (chars && chars.length > 0) {
      const map = {};
      chars.forEach(c => { map[c.player_id] = c.data; });
      charsMap = { ...charsMap, ...map };
      setCharacters(charsMap);
      charactersRef.current = charsMap;
    } else {
      const rows = Object.entries(window.CHARACTERS).map(([pid, data]) => ({ player_id: pid, data }));
      await window._db.from("characters").upsert(rows, { onConflict: "player_id" });
    }

    // Build the roster: premade slots + any custom-created players
    const { data: profs } = await window._db.from("player_profiles").select("*");
    const roster = window.buildRoster(profs, charsMap);
    window.PLAYERS = roster;
    setPlayers(roster);

    const { data: sess } = await window._db.from("sessions").select("*").order("id");
    if (sess && sess.length > 0) {
      setSessions(sess.map(s => s.data));
    } else {
      await window._db.from("sessions").upsert(
        window.SESSIONS.map(s => ({ id: s.id, data: s })), { onConflict: "id" }
      );
    }

    const { data: noteRows } = await window._db.from("notes").select("*").order("posted_at", { ascending: false });
    if (noteRows && noteRows.length > 0) {
      setNotes(noteRows.map(n => n.data));
    } else if (window.NOTES.length > 0) {
      await window._db.from("notes").upsert(
        window.NOTES.map(n => ({ id: n.id, author_player_id: n.authorId, data: n, posted_at: n.posted })),
        { onConflict: "id" }
      );
    }

    const { data: mediaRows } = await window._db.from("media_items").select("*").order("created_at", { ascending: false });
    if (mediaRows && mediaRows.length > 0) {
      setMedia(mediaRows.map(m => m.data));
    } else if (window.MEDIA.length > 0) {
      await window._db.from("media_items").upsert(
        window.MEDIA.map(m => ({ id: m.id, data: m, uploaded_by: m.uploader })),
        { onConflict: "id" }
      );
    }
  }, []);

  const refreshRoster = useCallback(async () => {
    const { data: profs } = await window._db.from("player_profiles").select("*");
    const roster = window.buildRoster(profs, charactersRef.current);
    window.PLAYERS = roster;
    setPlayers(roster);
  }, []);

  // ─── Auth ─────────────────────────────────────────────────────────────────

  const handleSession = useCallback(async (session) => {
    if (!session) {
      setAuthState("unauthenticated");
      setAuthUserId(null);
      setMeId(null);
      return;
    }
    setAuthUserId(session.user.id);
    const { data: profile } = await window._db
      .from("player_profiles").select("player_id").eq("id", session.user.id).single();
    if (!profile) {
      setAuthState("claiming");
      return;
    }
    setMeId(profile.player_id);
    setSelectedPlayer(profile.player_id === "gm" ? null : profile.player_id);
    setAuthState("loading");
    await loadAllData();
    setAuthState("ready");
  }, [loadAllData]);

  useEffect(() => {
    const { data: { subscription } } = window._db.auth.onAuthStateChange((event, session) => {
      if (!session) { handleSession(null); return; }
      // Supabase re-fires SIGNED_IN / TOKEN_REFRESHED when the tab regains focus
      // or the token auto-refreshes. If it's the same user we've already loaded,
      // ignore it so we don't drop back to "Loading your world…" every time.
      const sameUser = session.user.id === authUserIdRef.current;
      const alreadyUp = authStateRef.current === "ready" || authStateRef.current === "loading" || authStateRef.current === "claiming";
      if (sameUser && alreadyUp) return;
      handleSession(session);
    });
    // Check current session immediately on mount
    window._db.auth.getSession().then(({ data: { session } }) => {
      if (!session) setAuthState("unauthenticated");
      // if session exists, onAuthStateChange fires automatically
    });
    return () => subscription.unsubscribe();
  }, [handleSession]);

  // ─── Realtime sync ────────────────────────────────────────────────────────

  useEffect(() => {
    if (authState !== "ready") return;
    const ch = window._db.channel("respite-live")
      .on("postgres_changes", { event: "*", schema: "public", table: "characters" }, ({ new: row }) => {
        if (row && row.player_id) {
          setCharacters(prev => ({ ...prev, [row.player_id]: row.data }));
          charactersRef.current = { ...charactersRef.current, [row.player_id]: row.data };
          // A character for a player we don't know yet — a new custom adventurer joined
          if (!window.PLAYERS.some(p => p.id === row.player_id)) refreshRoster();
        }
      })
      .on("postgres_changes", { event: "*", schema: "public", table: "sessions" }, ({ new: row }) => {
        if (row && row.id) setSessions(prev => prev.map(s => s.id === row.id ? row.data : s));
      })
      .on("postgres_changes", { event: "INSERT", schema: "public", table: "notes" }, ({ new: row }) => {
        if (row && row.data) setNotes(prev => prev.some(n => n.id === row.id) ? prev : [row.data, ...prev]);
      })
      .on("postgres_changes", { event: "*", schema: "public", table: "media_items" }, () => {
        window._db.from("media_items").select("*").order("created_at", { ascending: false })
          .then(({ data }) => { if (data) setMedia(data.map(m => m.data)); });
      })
      .subscribe();
    return () => window._db.removeChannel(ch);
  }, [authState, refreshRoster]);

  // ─── Mutations ────────────────────────────────────────────────────────────

  const flushCharWrites = useCallback(() => {
    const queue = { ...charWriteQueue.current };
    charWriteQueue.current = {};
    Object.entries(queue).forEach(([pid, data]) => {
      window._db.from("characters").upsert({ player_id: pid, data }, { onConflict: "player_id" })
        .then(({ error }) => { if (error) console.warn("Character save failed:", error.message); });
    });
  }, []);

  const updateCharacter = useCallback((playerId, path, value) => {
    const cur = charactersRef.current[playerId] || {};
    const c = { ...cur };
    const parts = path.split(".");
    if (parts.length === 1) {
      c[parts[0]] = value;
    } else {
      c[parts[0]] = { ...c[parts[0]], [parts[1]]: value };
    }
    setCharacters(prev => ({ ...prev, [playerId]: c }));
    charactersRef.current = { ...charactersRef.current, [playerId]: c };
    charWriteQueue.current[playerId] = c;
    clearTimeout(charWriteTimer.current);
    charWriteTimer.current = setTimeout(flushCharWrites, 800);
  }, [flushCharWrites]);

  const setRsvp = useCallback((sessionId, playerId, value) => {
    setSessions(prev => prev.map(ss => {
      if (ss.id !== sessionId) return ss;
      const updated = { ...ss, rsvps: { ...ss.rsvps, [playerId]: value } };
      window._db.from("sessions").update({ data: updated }).eq("id", sessionId)
        .then(({ error }) => { if (error) console.warn("RSVP save failed:", error.message); });
      return updated;
    }));
  }, []);

  const addNote = useCallback(async (note) => {
    const newNote = { ...note, id: "n" + Date.now(), posted: new Date().toISOString() };
    setNotes(prev => [newNote, ...prev]);
    await window._db.from("notes").insert({
      id: newNote.id, author_player_id: newNote.authorId, data: newNote, posted_at: newNote.posted,
    });
  }, []);

  const addSession = useCallback(async (form) => {
    const id = "s" + Date.now();
    const existingNums = sessions.map(s => s.number || 0);
    const number = (existingNums.length ? Math.max(...existingNums) : 0) + 1;
    const session = {
      id, number,
      title: form.title || "Untitled session",
      summary: form.summary || "",
      date: form.date,                 // ISO datetime string
      mode: form.mode || "in-person",
      location: form.location || "",
      upcoming: true, past: false,
      rsvps: {},
    };
    setSessions(prev => [...prev, session]);
    const { error } = await window._db.from("sessions").insert({ id, data: session });
    if (error) console.warn("Session save failed:", error.message);
    return session;
  }, [sessions]);

  const updateSession = useCallback(async (sessionId, patch) => {
    setSessions(prev => prev.map(s => {
      if (s.id !== sessionId) return s;
      const updated = { ...s, ...patch };
      window._db.from("sessions").update({ data: updated }).eq("id", sessionId)
        .then(({ error }) => { if (error) console.warn("Session update failed:", error.message); });
      return updated;
    }));
  }, []);

  const deleteSession = useCallback(async (sessionId) => {
    setSessions(prev => prev.filter(s => s.id !== sessionId));
    const { error } = await window._db.from("sessions").delete().eq("id", sessionId);
    if (error) console.warn("Session delete failed:", error.message);
  }, []);

  const uploadMedia = useCallback(async (file, folder = "Uploads") => {
    const ext = file.name.split(".").pop().toLowerCase();
    const isImage = ["jpg","jpeg","png","gif","webp","svg","avif"].includes(ext);
    const kind = isImage ? "image" : "doc";
    const path = `${Date.now()}_${file.name.replace(/\s+/g, "_")}`;

    const { error: upErr } = await window._db.storage.from("media").upload(path, file);
    if (upErr) { console.error("Upload failed:", upErr.message); return null; }

    const { data: urlData } = window._db.storage.from("media").getPublicUrl(path);
    const newItem = {
      id: "m" + Date.now(), kind, folder,
      title: file.name.replace(/\.[^.]+$/, "").replace(/[_-]+/g, " "),
      uploader: meId,
      date: new Date().toISOString().split("T")[0],
      tags: [ext], url: urlData.publicUrl, storage_path: path,
      ...(isImage
        ? { placeholder: file.name }
        : { ext, size: file.size > 1048576 ? (file.size/1048576).toFixed(1)+" MB" : Math.round(file.size/1024)+" KB" }),
    };
    setMedia(prev => [newItem, ...prev]);
    await window._db.from("media_items").insert({
      id: newItem.id, data: newItem, storage_path: path, uploaded_by: meId,
    });
    return newItem;
  }, [meId]);

  // Upload a character portrait image to the shared "media" bucket; returns its public URL.
  const uploadPortrait = useCallback(async (file) => {
    const ext = (file.name.split(".").pop() || "img").toLowerCase();
    if (!["jpg","jpeg","png","gif","webp","avif"].includes(ext)) {
      alert("Please choose an image file (jpg, png, gif, webp, avif).");
      return null;
    }
    const path = `portraits/${Date.now()}_${file.name.replace(/\s+/g, "_")}`;
    const { error: upErr } = await window._db.storage.from("media").upload(path, file, { upsert: true });
    if (upErr) { console.error("Portrait upload failed:", upErr.message); alert("Upload failed: " + upErr.message); return null; }
    const { data: urlData } = window._db.storage.from("media").getPublicUrl(path);
    return urlData.publicUrl;
  }, []);

  const logout = useCallback(async () => {
    await window._db.auth.signOut();
  }, []);

  // ─── Render gates ─────────────────────────────────────────────────────────

  if (authState === "booting")         return <AppLoading message="Waking the fire…"/>;
  if (authState === "unauthenticated") return <LoginScreen/>;
  if (authState === "claiming")        return <ClaimProfile userId={authUserId} onClaimed={async (pid) => {
    setMeId(pid);
    setSelectedPlayer(pid === "gm" ? null : pid);
    setAuthState("loading");
    await loadAllData();
    setAuthState("ready");
  }}/>;
  if (authState === "loading")         return <AppLoading message="Loading your world…"/>;

  const me = players.find(p => p.id === meId) || players[0];

  const ctx = {
    players: players,
    characters, sessions, media, notes,
    tab, setTab,
    meId,
    selectedPlayer, setSelectedPlayer,
    setRsvp, updateCharacter, addNote, uploadMedia, uploadPortrait,
    addSession, updateSession, deleteSession,
    sheetLayout: tweaks.sheetLayout,
  };

  return (
    <AppContext.Provider value={ctx}>
      <header className="topnav">
        <div className="topnav-inner">
          <div className="brand">
            {tweaks.showSigil && <div className="brand-sigil"></div>}
            <div>
              <div className="brand-name">The Respite</div>
              <div className="brand-tag">— A place to recover for weary adventurers —</div>
            </div>
          </div>
          <nav className="tabs">
            {[
              { id: "hub", label: "Hub" },
              { id: "events", label: "Events" },
              { id: "characters", label: "Characters" },
              { id: "media", label: "Media" },
              { id: "notes", label: "Notes" },
              { id: "dice", label: "Dice" },
            ].map(t => (
              <button key={t.id} className={`tab ${tab === t.id ? "active" : ""}`} onClick={() => setTab(t.id)}>
                {t.label}
              </button>
            ))}
          </nav>
          <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
            <div className="user-chip">
              <Avatar player={me}/>
              <div style={{ fontSize: 12, lineHeight: 1.2 }}>
                <div className="serif" style={{ color: "var(--ink-0)", fontWeight: 600 }}>{me.name}</div>
                <div className="dim" style={{ fontSize: 10 }}>{me.role}</div>
              </div>
            </div>
            <button onClick={logout} className="btn ghost sm"
              style={{ fontSize: 11, padding: "4px 10px", flexShrink: 0 }}>
              Sign out
            </button>
          </div>
        </div>
      </header>

      <main>
        {tab === "hub" && <Hub/>}
        {tab === "events" && <EventsTab/>}
        {tab === "characters" && <CharactersTab/>}
        {tab === "media" && <MediaTab/>}
        {tab === "notes" && <NotesTab/>}
        {tab === "dice" && <DiceTab/>}
      </main>

      <footer style={{ textAlign: "center", padding: "40px 20px 60px", color: "var(--ink-3)" }}>
        <div className="flourish" style={{ maxWidth: 380, margin: "0 auto" }}>The fire keeps</div>
        <div className="dim mono" style={{ fontSize: 10, marginTop: 14 }}>
          THE RESPITE · A DRAWSTEEL COMPANION · BUILT FOR THE PARTY OF FIVE
        </div>
      </footer>

      <TweaksPanel title="Tweaks">
        <TweakSection title="Theme">
          <TweakSelect
            label="Aesthetic"
            value={tweaks.theme}
            onChange={v => setTweak("theme", v)}
            options={[
              { value: "obsidian", label: "Obsidian & ember (default)" },
              { value: "inn", label: "Inn at dusk" },
              { value: "arcane", label: "Arcane tome" },
              { value: "wild", label: "Wilderness camp" },
            ]}
          />
          <TweakToggle
            label="Show brand sigil"
            value={tweaks.showSigil}
            onChange={v => setTweak("showSigil", v)}
          />
        </TweakSection>
        <TweakSection title="Character sheet">
          <TweakRadio
            label="Layout"
            value={tweaks.sheetLayout}
            onChange={v => setTweak("sheetLayout", v)}
            options={[
              { value: "spread", label: "Spread" },
              { value: "stacked", label: "Stacked" },
            ]}
          />
        </TweakSection>
      </TweaksPanel>
    </AppContext.Provider>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
